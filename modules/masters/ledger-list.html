<div class="animate-in container-fluid">
    
    <div id="ledgerListSection" class="card border-0 shadow-sm">
        <div class="card-header bg-white p-3">
            <div class="row align-items-center g-3">
                <div class="col-md-5">
                    <h5 class="fw-bold mb-0 text-dark">Chart of Accounts (Ledgers)</h5>
                </div>
                <div class="col-md-4 ms-auto">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="ledgerSearchFilter" class="form-control border-start-0 bg-light" 
                               placeholder="Search..." onkeyup="LedgerApp.FilterList()">
                    </div>
                </div>
                <div class="col-md-auto text-end">
                    <button class="btn btn-primary btn-sm px-3 shadow-sm fw-bold w-100" onclick="LedgerApp.ShowCreateForm()">
                        <i class="bi bi-plus-lg me-1"></i> New Ledger
                    </button>
                </div>
            </div>
        </div>
        <div class="table-responsive" style="max-height: calc(100vh - 250px); overflow-y: auto;">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-muted small text-uppercase sticky-top">
                    <tr>
                        <th class="ps-4">GL Code</th>
                        <th class="ps-4">Ledger Name</th>
                        <th>Linked Company</th>
                        <th>Group/Project</th>
                        <th class="text-end">Opening Bal</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="ledgerListBody" class="small"></tbody>
            </table>
        </div>
    </div>

    <div id="ledgerFormSection" style="display: none;">
        <div id="dynamicFormContainer"></div>
    </div>

</div>
<script>
const LedgerApp = {
    DbSheet: 'LedgerCreation',
    FormUrl: 'modules/masters/ledger-cw.html',
    currentFormId: null,
    _masterCache: {},

    // --- DYNAMIC FIELDS CONFIGURATION ---
    dynamicFieldsConfig: {
        "Bank Accounts": [
            { name: "bankName", label: "Bank Name", type: "text", required: true, placeholder: "Enter bank name", className: "col-md-6" },
            { name: "accountNumber", label: "Account Number", type: "text", required: true, placeholder: "Enter account number", className: "col-md-6" },
            { name: "ifscCode", label: "IFSC Code", type: "text", required: true, placeholder: "Enter IFSC code", className: "col-md-4" },
            { name: "branchName", label: "Branch Name", type: "text", required: false, placeholder: "Enter branch name", className: "col-md-4" },
            { name: "swiftCode", label: "Swift Code", type: "text", required: false, placeholder: "Enter Swift code", className: "col-md-4" },
            { name: "openingBalance", label: "Opening Balance", type: "number", required: false, placeholder: "Enter opening balance", className: "col-md-6" }
        ],
        
        "Sundry Debtors": [
            { name: "creditLimit", label: "Credit Limit", type: "number", required: true, placeholder: "Enter credit limit", className: "col-md-4" },
            { name: "creditDays", label: "Credit Days", type: "number", required: true, placeholder: "Enter credit days", className: "col-md-4" },
            { name: "contactPerson", label: "Contact Person", type: "text", required: false, placeholder: "Enter contact person", className: "col-md-4" },
            { name: "panNumber", label: "PAN Number", type: "text", required: false, placeholder: "Enter PAN number", className: "col-md-6" },
            { name: "gstNumber", label: "GST Number", type: "text", required: false, placeholder: "Enter GST number", className: "col-md-6" }
        ],
        
        "Sundry Creditors": [
            { name: "vendorCode", label: "Vendor Code", type: "text", required: true, placeholder: "Enter vendor code", className: "col-md-4" },
            { name: "creditPeriod", label: "Credit Period (Days)", type: "number", required: true, placeholder: "Enter credit period", className: "col-md-4" },
            { name: "contactPerson", label: "Contact Person", type: "text", required: false, placeholder: "Enter contact person", className: "col-md-4" },
            { name: "panNumber", label: "PAN Number", type: "text", required: false, placeholder: "Enter PAN number", className: "col-md-4" },
            { name: "gstNumber", label: "GST Number", type: "text", required: false, placeholder: "Enter GST number", className: "col-md-4" },
            { name: "tdsApplicable", label: "TDS Applicable", type: "checkbox", required: false, className: "col-md-4" }
        ],
        
        "Direct Incomes": [
            { name: "incomeCategory", label: "Income Category", type: "select", required: true,
              options: ["Commission", "Interest", "Rent", "Royalty", "Dividend"], className: "col-md-4" },
            { name: "taxRate", label: "Tax Rate (%)", type: "number", required: true, placeholder: "Enter tax rate", className: "col-md-4" },
            { name: "sacCode", label: "SAC Code", type: "text", required: false, placeholder: "Enter SAC code", className: "col-md-4" }
        ],
        
        "Fixed Assets": [
            { name: "assetType", label: "Asset Type", type: "select", required: true,
              options: ["Building", "Machinery", "Vehicles", "Furniture", "Computers", "Other"], className: "col-md-4" },
            { name: "depreciationRate", label: "Depreciation Rate (%)", type: "number", required: true, placeholder: "Enter depreciation rate", className: "col-md-4" },
            { name: "purchaseDate", label: "Purchase Date", type: "date", required: false, className: "col-md-4" },
            { name: "purchaseValue", label: "Purchase Value", type: "number", required: false, placeholder: "Enter purchase value", className: "col-md-6" }
        ]
    },

    // --- HANDLE LEDGER TYPE CHANGE ---
    handleLedgerTypeChange(event) {
        const selectedType = event.target.value;
        const form = event.target.closest('form');
        if (!form) return;

        // Remove existing dynamic container
        const existingContainer = document.getElementById('dynamicFieldsContainer');
        if (existingContainer) existingContainer.remove();

        // If no type selected, return
        if (!selectedType) return;

        // Get configuration for selected type
        const config = this.dynamicFieldsConfig[selectedType];
        if (!config) return;

        // Create container
        const container = document.createElement('div');
        container.id = 'dynamicFieldsContainer';
        container.className = 'row g-3 mt-3';

        // Add section header
        const header = document.createElement('div');
        header.className = 'col-12';
        header.innerHTML = `
            <h6 class="fw-bold text-primary mb-3">
                ${selectedType} Details
            </h6>
        `;
        container.appendChild(header);

        // Render fields
        config.forEach(field => {
            const col = document.createElement('div');
            col.className = field.className || 'col-md-6';
            
            const formGroup = document.createElement('div');
            formGroup.className = 'mb-2';
            
            // Label
            const label = document.createElement('label');
            label.className = 'form-label small fw-bold';
            label.textContent = field.label;
            if (field.required) {
                const required = document.createElement('span');
                required.className = 'text-danger ms-1';
                required.textContent = '*';
                label.appendChild(required);
            }
            formGroup.appendChild(label);
            
            // Input element
            let input;
            
            if (field.type === 'select') {
                input = document.createElement('select');
                input.className = 'form-select form-select-sm';
                input.name = field.name;
                input.dataset.dynamicField = 'true';
                
                const defaultOption = document.createElement('option');
                defaultOption.value = '';
                defaultOption.textContent = 'Select...';
                input.appendChild(defaultOption);
                
                (field.options || []).forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    input.appendChild(option);
                });
            } else if (field.type === 'checkbox') {
                input = document.createElement('input');
                input.type = 'checkbox';
                input.className = 'form-check-input';
                input.name = field.name;
                input.id = `field_${field.name}`;
                input.dataset.dynamicField = 'true';
                
                const checkDiv = document.createElement('div');
                checkDiv.className = 'form-check';
                checkDiv.appendChild(input);
                
                const checkLabel = document.createElement('label');
                checkLabel.className = 'form-check-label small';
                checkLabel.htmlFor = `field_${field.name}`;
                checkLabel.textContent = field.label;
                checkDiv.appendChild(checkLabel);
                
                formGroup.appendChild(checkDiv);
                col.appendChild(formGroup);
                container.appendChild(col);
                return;
            } else {
                input = document.createElement('input');
                input.type = field.type || 'text';
                input.className = 'form-control form-control-sm';
                input.name = field.name;
                input.placeholder = field.placeholder || '';
                input.dataset.dynamicField = 'true';
                if (field.required) input.required = true;
            }
            
            formGroup.appendChild(input);
            col.appendChild(formGroup);
            container.appendChild(col);
        });

        // Insert container after the ledgerType field
        const ledgerTypeField = form.querySelector('[name="ledgerType"]');
        if (ledgerTypeField) {
            const parentRow = ledgerTypeField.closest('.row') || ledgerTypeField.parentElement;
            parentRow.after(container);
        } else {
            const cardBody = form.querySelector('.card-body') || form;
            cardBody.appendChild(container);
        }

        // Trigger datalist population for any new data-fetch-column fields
        if (typeof API !== 'undefined' && API.PopulateAllDatalists) {
            setTimeout(() => {
                API.PopulateAllDatalists(form);
            }, 100);
        }
    },

    // --- INITIALIZE DYNAMIC FIELDS (Your exact function) ---
    initializeDynamicFields(form) {
        const ledgerTypeInput = form.querySelector('input[name="ledgerType"]');
        
        if (ledgerTypeInput) {
            // Store reference to this
            const self = this;
            
            // Remove existing listener if any
            ledgerTypeInput.removeEventListener('change', self.handleLedgerTypeChange);
            // Add change event listener
            ledgerTypeInput.addEventListener('change', function(e) {
                self.handleLedgerTypeChange(e);
            });
            
            // Also handle input events for datalist selection
            ledgerTypeInput.addEventListener('input', function() {
                const datalist = document.getElementById('led-groups');
                if (datalist) {
                    const options = Array.from(datalist.options);
                    const isValid = options.some(opt => opt.value === this.value);
                    if (isValid) {
                        self.handleLedgerTypeChange({ target: this });
                    } else if (this.value === '') {
                        const existingContainer = document.getElementById('dynamicFieldsContainer');
                        if (existingContainer) existingContainer.remove();
                    }
                }
            });

            // Trigger initial load if value exists
            if (ledgerTypeInput.value) {
                setTimeout(() => {
                    self.handleLedgerTypeChange({ target: ledgerTypeInput });
                }, 300);
            }
        }
    },

    // --- 1. CORE HTML MATERIALIZER ---
    async FetchAndInjectForm(formInstanceId = 'default') {
        this.currentFormId = formInstanceId;
        const container = document.getElementById('dynamicFormContainer');
        container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="text-muted mt-2">Loading Template...</p></div>';

        try {
            const response = await fetch(LedgerApp.FormUrl + '?t=' + Date.now());
            if (!response.ok) throw new Error("Could not find form template at " + LedgerApp.FormUrl);
            
            const htmlString = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            
            const formElement = doc.querySelector('form');
            if (!formElement) throw new Error("No <form> tag found inside ledger-cw.html");

            // Add unique ID to form
            const formId = `ledgerForm_${formInstanceId}_${Date.now()}`;
            formElement.id = formId;
            formElement.dataset.instanceId = formInstanceId;

            // Add Back Button
            const submitBtn = formElement.querySelector('button[type="submit"]');
            if (submitBtn) {
                const btnGroup = document.createElement('div');
                btnGroup.className = 'd-flex gap-2 align-items-center';
                const backBtn = document.createElement('button');
                backBtn.type = 'button';
                backBtn.className = 'btn btn-primary btn-sm shadow-sm fw-bold px-2 mb-0';
                backBtn.title = 'Back to List';
                backBtn.innerHTML = '<i class="bi bi-arrow-left"></i>';
                backBtn.onclick = () => LedgerApp.ShowList();

                submitBtn.parentNode.insertBefore(btnGroup, submitBtn);
                btnGroup.appendChild(backBtn);
                btnGroup.appendChild(submitBtn);
            }

            container.innerHTML = ''; 
            container.appendChild(formElement);
            
            const newForm = container.querySelector('form');
            newForm.addEventListener('submit', LedgerApp.HandleSubmit);

            // --- Populate datalists ---
            await LedgerApp.PopulateAllDatalists(newForm);
            
            // --- Initialize dynamic fields (Your function) ---
            LedgerApp.initializeDynamicFields(newForm);

            // Dispatch event
            document.dispatchEvent(new CustomEvent('DynamicFormLoaded', { 
                detail: { 
                    form: newForm, 
                    instanceId: formInstanceId,
                    formId: formId
                } 
            }));

            return newForm;
        } catch (error) {
            container.innerHTML = `<div class="alert alert-danger m-3 fw-bold">Template Error: ${error.message}</div>`;
            return null;
        }
    },

    // --- 2. POPULATE ALL DATALISTS ---
    async PopulateAllDatalists(form) {
        const lookupInputs = form.querySelectorAll('[data-fetch_column]');
        
        for (const input of lookupInputs) {
            const sheet = input.dataset.sheet_name;
            const listId = input.getAttribute('list');
            if (!sheet || !listId) continue;
            
            input.dataset.originalPlaceholder = input.placeholder || 'Search...';
            input.readOnly = true;
            input.placeholder = 'Loading...';
            input.classList.add('loading-input');
        }
        
        for (const input of lookupInputs) {
            const sheet = input.dataset.sheet_name;
            const colDef = input.dataset.column_name;
            const listId = input.getAttribute('list');
            
            if (!sheet || !listId) continue;
            
            try {
                let data = this._masterCache[sheet];
                
                if (!data) {
                    input.style.opacity = '0.7';
                    
                    let rawResponse = await API.Fetch(`Masters/${sheet}`);
                    data = rawResponse?.data || rawResponse?.result || rawResponse;
                    this._masterCache[sheet] = data;
                    
                    input.style.opacity = '';
                }
                
                const datalist = document.getElementById(listId);
                if (datalist && data && typeof data === 'object') {
                    datalist.innerHTML = "";
                    const cols = colDef.split('&').map(c => c.trim());
                    const dataArray = Array.isArray(data) ? data : Object.values(data);
                    
                    dataArray.forEach(record => {
                        if (cols.length === 1) {
                            const value = record[cols[0]];
                            if (value) {
                                const option = document.createElement('option');
                                option.value = value;
                                option.textContent = value;
                                datalist.appendChild(option);
                            }
                        } 
                        else if (cols.length >= 2) {
                            const textPart = record[cols[0]];
                            const valuePart = record[cols[1]];
                            
                            if (textPart && valuePart) {
                                const option = document.createElement('option');
                                option.value = valuePart;
                                option.textContent = textPart;
                                option.setAttribute('data-value', valuePart);
                                option.setAttribute('data-text', textPart);
                                datalist.appendChild(option);
                            }
                        }
                    });
                    
                    const event = new CustomEvent('datalistPopulated', { 
                        detail: { sheet: sheet, listId: listId, count: dataArray.length }
                    });
                    input.dispatchEvent(event);
                }
            } catch (error) {
                console.error(`Error populating ${sheet}:`, error);
                input.placeholder = 'Error loading data';
                input.classList.add('error-input');
            } finally {
                input.readOnly = false;
                input.classList.remove('loading-input');
                
                if (input.dataset.originalPlaceholder) {
                    input.placeholder = input.dataset.originalPlaceholder;
                } else {
                    input.placeholder = 'Search...';
                }
            }
        }
    },

    // --- 3. VIEW CONTROLLERS ---
    ShowList() {
        document.getElementById('ledgerFormSection').style.display = 'none';
        document.getElementById('ledgerListSection').style.display = 'block';
        document.getElementById('dynamicFormContainer').innerHTML = '';
        this.currentFormId = null;
        this.FetchAndRenderList(); 
    },

    async ShowCreateForm() {
        document.getElementById('ledgerListSection').style.display = 'none';
        document.getElementById('ledgerFormSection').style.display = 'block';
        
        const form = await this.FetchAndInjectForm('create');
        if (!form) return;

        const title = form.querySelector('h5');
        if (title) title.innerText = 'Create New Ledger';
        
        form.reset();
        
        const hiddenId = form.querySelector('[name="hiddenRecordId"]');
        if (hiddenId) hiddenId.remove();
    },

    async ShowEditForm(recordId, encodedData) {
        document.getElementById('ledgerListSection').style.display = 'none';
        document.getElementById('ledgerFormSection').style.display = 'block';

        const form = await this.FetchAndInjectForm('edit');
        if (!form) return;

        const data = JSON.parse(decodeURIComponent(encodedData));

        // Inject ID
        let hiddenId = form.querySelector('[name="hiddenRecordId"]');
        if (!hiddenId) {
            hiddenId = document.createElement('input');
            hiddenId.type = 'hidden';
            hiddenId.name = 'hiddenRecordId';
            form.appendChild(hiddenId);
        }
        hiddenId.value = recordId;

        // First set the ledgerType value to trigger dynamic fields
        const ledgerTypeInput = form.querySelector('[name="ledgerType"]');
        if (ledgerTypeInput && data.ledgerType) {
            ledgerTypeInput.value = data.ledgerType;
            // Trigger change event to load dynamic fields
            setTimeout(() => {
                const event = new Event('change', { bubbles: true });
                ledgerTypeInput.dispatchEvent(event);
            }, 100);
        }

        // Hydrate form fields
        const hydrate = () => {
            Object.keys(data).forEach(key => {
                const inputs = form.querySelectorAll(`[name="${key}"]`);
                inputs.forEach(input => {
                    const value = data[key];
                    if (value === undefined || value === null) return;
                    
                    if (input.type === 'radio') {
                        input.checked = (input.value === String(value));
                    } else if (input.type === 'checkbox') {
                        input.checked = (value === true || value === 'true' || value === '1');
                    } else if (input.tagName === 'SELECT') {
                        const option = Array.from(input.options).find(opt => opt.value === String(value));
                        if (option) input.value = option.value;
                    } else {
                        input.value = value;
                    }
                });
            });
        };

        // Run hydrate multiple times with delays
        setTimeout(hydrate, 200);
        setTimeout(hydrate, 500);
        setTimeout(hydrate, 1000);

        // UI Polish
        const title = form.querySelector('h5');
        if (title) {
            const displayName = data.name || data.LedgerName || data.ledgerName || '';
            title.innerText = `Edit Ledger: ${displayName}`;
        }
        
        const btn = form.querySelector('button[type="submit"]');
        if (btn) {
            btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i> ';
            // btn.classList.remove('btn-success');
            // btn.classList.add('btn-primary');
            btn.title = "Update Data"
        }
    },

    // --- 4. FORM SUBMIT HANDLER ---
    async HandleSubmit(e) {
        e.preventDefault();
        const form = e.target;
        
        const btn = form.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Processing...';
        btn.disabled = true;

        const formData = new FormData(form);
        const payload = Object.fromEntries(formData.entries());
        
        // Handle unchecked checkboxes
        form.querySelectorAll('input[type="checkbox"]:not(:checked)').forEach(cb => {
            if (cb.name) payload[cb.name] = false; 
        });

        const recordId = payload.hiddenRecordId;
        delete payload.hiddenRecordId;

        try {
            if (recordId) {
                let success = false;
                
                if (typeof API.UpdateTransaction === 'function') {
                    success = await API.UpdateTransaction(`Masters/${LedgerApp.DbSheet}`, recordId, payload);
                } else {
                    const result = await API.Update(`Masters/${LedgerApp.DbSheet}/${recordId}`, payload);
                    success = result !== null && result !== undefined;
                }
                
                if (!success) throw new Error("Update operation failed.");
                
                App.UI.Notify('Success', 'Ledger Updated Successfully', 'success');
                
            } else {
                payload.created_at = new Date().toISOString();
                payload.updated_at = payload.created_at;
                
                const result = await API.Create(`Masters/${LedgerApp.DbSheet}`, payload);
                
                if (!result) throw new Error("Create operation failed.");
                
                App.UI.Notify('Success', 'Ledger Created Successfully', 'success');
            }
            
            LedgerApp._masterCache = {};
            LedgerApp.ShowList();
            
        } catch (error) {
            console.error("Save Error:", error);
            App.UI.Notify('Error', error.message || 'Save failed', 'danger');
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    },
// --- 5. DELETE TRANSACTION (With System GL Protection) ---
async DeleteRecord(id, btnElement) {
    // First, fetch the record to check if it's a system GL
    try {
        const record = await API.Fetch(`Masters/${LedgerApp.DbSheet}/${id}`);
        const data = record?.data || record?.result || record;
        
        // Check if it's a system GL code
        const glCode = data?.ledgerCode || data?.LedgerCode || data?.code || '';
        const protectedCodes = ['SYS-SALES', 'SYS-PURCH', 'SYS-TAX'];
        
        if (protectedCodes.includes(glCode)) {
            App.UI.Notify('Error', `Cannot delete system ledger: ${glCode}. This is a protected system record.`, 'danger');
            return;
        }
        
        // Also check by name as fallback
        const name = data?.name || data?.LedgerName || '';
        if (name.includes('SYS-') || name.includes('System')) {
            App.UI.Notify('Error', 'Cannot delete system ledger. This is a protected system record.', 'danger');
            return;
        }
        
    } catch (error) {
        console.warn('Could not fetch record details:', error);
        // Continue with deletion if we can't fetch details (but warn)
        if (!confirm('⚠️ Warning: Could not verify record details.\n\nAre you sure you want to delete this ledger?')) {
            return;
        }
    }
    
    // Confirm deletion
    if (!confirm('⚠️ Are you sure you want to delete this ledger?\n\nThis action cannot be undone!')) {
        return;
    }
    
    const originalHtml = btnElement.innerHTML;
    btnElement.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    btnElement.disabled = true;
    
    try {
        let success = false;
        
        if (typeof API.DeleteTransaction === 'function') {
            success = await API.DeleteTransaction(`Masters/${LedgerApp.DbSheet}`, id);
        } else {
            const result = await API.Delete(`Masters/${LedgerApp.DbSheet}/${id}`);
            success = result !== null && result !== undefined;
        }
        
        if (!success) throw new Error("Delete operation failed.");
        
        const row = btnElement.closest('tr');
        if (row) {
            row.style.transition = 'all 0.3s ease';
            row.style.opacity = '0';
            setTimeout(() => row.remove(), 300);
        }
        
        App.UI.Notify('Success', 'Ledger Deleted Successfully', 'success');
        LedgerApp._masterCache = {};
        setTimeout(() => LedgerApp.FetchAndRenderList(), 500);
        
    } catch (error) {
        console.error("Delete Error:", error);
        App.UI.Notify('Error', error.message || 'Delete failed', 'danger');
        btnElement.innerHTML = originalHtml;
        btnElement.disabled = false;
    }
},

    // --- 6. LIST DATA FETCHING ---
    async FetchAndRenderList() {
        const tbody = document.getElementById('ledgerListBody');
        if (!tbody) return;
        
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5">
            <div class="spinner-border spinner-border-sm text-primary me-2"></div>
            <span class="text-muted">Loading ledgers...</span>
        </td></tr>`;

        try {
            let rawResponse = await API.Fetch(`Masters/${this.DbSheet}`);
            let data = rawResponse?.data || rawResponse?.result || rawResponse; 
            
            tbody.innerHTML = '';
            
            if (!data || Object.keys(data).length === 0) {
                return tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">
                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                    No ledgers found. Create your first ledger!
                </td></tr>`;
            }

            const entries = Array.isArray(data) ? data.map((v, i) => [v.id || i, v]) : Object.entries(data);

            entries.forEach(([id, record]) => {
                if (!record || typeof record !== 'object') return;
                
                const encoded = encodeURIComponent(JSON.stringify(record));
                
                const opBal = parseFloat(record.openingBalance || record.OpeningBalance || record.openingAmount || 0);
                const ledgerNature = (record.ledgerNature || record.LedgerNature || record.nature || '').toLowerCase();
                
                let balanceType = '';
                let color = 'text-muted';
                let displayBalance = '-';
                
                if (opBal !== 0) {
                    displayBalance = new Intl.NumberFormat('en-IN', { 
                        style: 'currency', 
                        currency: 'INR',
                        minimumFractionDigits: 0,
                        maximumFractionDigits: 2
                    }).format(Math.abs(opBal));
                    
                    if (ledgerNature === 'debit' || ledgerNature === 'dr' || ledgerNature === 'asset' || ledgerNature === 'expense') {
                        if (opBal > 0) {
                            balanceType = '(Dr)';
                            color = 'text';
                        } else {
                            balanceType = '(Cr)';
                            color = 'text';
                        }
                    } else if (ledgerNature === 'credit' || ledgerNature === 'cr' || ledgerNature === 'liability' || ledgerNature === 'income' || ledgerNature === 'equity') {
                        if (opBal > 0) {
                            balanceType = '(Cr)';
                            color = 'text';
                        } else {
                            balanceType = '(Dr)';
                            color = 'text';
                        }
                    } else {
                        if (opBal > 0) {
                            balanceType = '(Credit)';
                            color = 'text';
                        } else {
                            balanceType = '(Debit)';
                            color = 'text';
                        }
                    }
                }

                tbody.innerHTML += `
                    <tr class="ledger-row" data-id="${id}">
                        <td class="ps-4 ledger-code">${record.ledgerCode || '-'}</td>
                        <td class="ps-4 ledger-name">${record.name || record.LedgerName || 'Unknown'}</td>
                        <td class="text-muted small text-center ledger-company">${record.CompanyName || ''}</td>
                        <td class="text-muted small text-center ledger-group">${record.GroupName || record.ProfitCenter || ''}</td>
                        <td class="text-end fw-medium ${color}">
                            ${displayBalance} <span class="small">${balanceType}</span>
                        </td>
                        <td class="text-end pe-4" style="white-space: nowrap;">
                            <button class="btn btn-sm btn-light text-primary border me-1" 
                                    onclick="LedgerApp.ShowEditForm('${id}', '${encoded}')"
                                    title="Edit Ledger">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-light text-danger border" 
                                    onclick="LedgerApp.DeleteRecord('${id}', this)"
                                    title="Delete Ledger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            const countEl = document.getElementById('ledgerCount');
            if (countEl) {
                countEl.innerText = `(${entries.length} records)`;
            }
            
        } catch (error) {
            console.error("Fetch Error:", error);
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-danger">
                <i class="bi bi-exclamation-triangle fs-3 d-block mb-2"></i>
                Error: ${error.message}
            </td></tr>`;
        }
    },

    // --- 7. SEARCH/FILTER ---
    FilterList() {
        const query = document.getElementById('ledgerSearchFilter')?.value?.toLowerCase() || '';
        const rows = document.querySelectorAll('#ledgerListBody tr.ledger-row');
        
        rows.forEach(row => {
            const code = row.querySelector('.ledger-code')?.innerText?.toLowerCase() || '';
            const name = row.querySelector('.ledger-name')?.innerText?.toLowerCase() || '';
            const comp = row.querySelector('.ledger-company')?.innerText?.toLowerCase() || '';
            const group = row.querySelector('.ledger-group')?.innerText?.toLowerCase() || '';
            
            const match = code.includes(query) || name.includes(query) || 
                         comp.includes(query) || group.includes(query);
            row.style.display = match ? '' : 'none';
        });
        
        const visible = document.querySelectorAll('#ledgerListBody tr.ledger-row:not([style*="display: none"])').length;
        const countEl = document.getElementById('ledgerVisibleCount');
        if (countEl) {
            countEl.innerText = `Showing ${visible} of ${document.querySelectorAll('#ledgerListBody tr.ledger-row').length}`;
        }
    }
};

// --- FIX: Override UpdateTransaction to work with Masters path ---
if (typeof API !== 'undefined' && API.UpdateTransaction) {
    const originalUpdateTransaction = API.UpdateTransaction;
    API.UpdateTransaction = async function(formId, key, updatedData) {
        try {
            if (formId.includes('Masters')) {
                await this.DB.ref(`${App.State.userId}/${formId}/${key}`).update(updatedData);
            } else {
                await originalUpdateTransaction.call(this, formId, key, updatedData);
            }
            App.UI.Notify('Success', 'Record Updated Successfully', 'success');
            return true;
        } catch (e) {
            console.error('Update Error:', e);
            App.UI.Notify('Error', 'Update failed: ' + e.message, 'danger');
            return false;
        }
    };
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    if (document.getElementById('ledgerListBody')) {
        LedgerApp.FetchAndRenderList();
    }
});

if (document.readyState === 'complete' || document.readyState === 'interactive') {
    if (document.getElementById('ledgerListBody')) {
        setTimeout(() => LedgerApp.FetchAndRenderList(), 50);
    }
}
</script>
