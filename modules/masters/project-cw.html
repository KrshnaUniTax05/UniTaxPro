<div class="animate-in">
    <form id="Projects" data-listattribute="project" data-category="Masters" autocomplete="off">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light unitax-header">
                    <div>
                        <h5 class="fw-bold mb-0">Profit Center / Project</h5>
                        <p class="text-muted small mb-0">Manage cost segments and performance centers</p>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm px-3 shadow-sm fw-bold"><i class="bi bi-check2 me-1"></i></button>
                </div>

                <div class="p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Project Code</label>
                            <input type="text" name="ProjectCode" class="form-control form-control-sm upper-case  fw-bold" 
                                   data-check-unique="true" data-sheet_name="Projects" data-column_name="ProjectCode" maxlength="6" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label small fw-bold">Profit Center Name</label>
                            <input type="text" name="ProjectName" class="form-control form-control-sm proper-case" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Linked Company</label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-white"><i class="bi bi-building"></i></span>
                                <input type="text" name="CompanyName" list="compList_proj" class="form-control" 
                                       data-fetch_column data-sheet_name="Companies" data-column_name="companyName & CompanyCode" required>
                            </div>
                            <datalist id="compList_proj"></datalist>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
