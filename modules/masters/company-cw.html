<div class="animate-in">
    <form id="Companies" data-category="Masters" autocomplete="off">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-body p-0">
                <!-- Command Header -->
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light sticky-top z-10 unitax-header">
                    <div>
                        <h5 class="fw-bold mb-0 text-dark">Company Master</h5>
                        <p class="text-muted small mb-0">Define legal entity, tax registrations, and banking</p>
                    </div>
                    <div class="d-flex gap-2">
                        <!-- <button type="button" class="btn btn-white btn-sm border fw-semibold" onclick="App.Router('masters/company-cw')">Reset</button> -->
                        <button type="submit" class="btn btn-success btn-sm px-3 shadow-sm fw-bold">
                            <i class="bi bi-check2 me-1"></i>
                        </button>
                    </div>
                </div>

                <!-- Detail Content -->
                <div class="p-4">
                    <div class="row g-4">
                        <!-- Primary Identity -->
                        <div class="col-12">
                            <div class="p-3 border rounded-3 bg-white">
                                <h6 class="fw-bold text-primary small text-uppercase mb-3">Primary Identity</h6>
                                <div class="row g-3">
                                    <div class="col-md-2">
                                        <label class="form-label small fw-bold">Company Code</label>
                                        <input type="text" name="CompanyCode" class="form-control form-control-sm  upper-case fw-bold" 
                                               data-check-unique="true" data-sheet_name="Companies" data-column_name="CompanyCode" 
                                               maxlength="4" minlength="4" placeholder="1000" required>
                                    </div>
                                    <div class="col-md-7">
                                        <label class="form-label small fw-bold">Company Full Name (Legal Name)</label>
                                        <input type="text" name="companyName" class="form-control form-control-sm proper-case" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label small fw-bold">Incorporation Date</label>
                                        <input type="date" name="incorporationDate" class="form-control form-control-sm">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Address & Communication -->
                        <div class="col-md-7">
                            <div class="p-3 border rounded-3 bg-white h-100">
                                <h6 class="fw-bold text-primary small text-uppercase mb-3">Communication Details</h6>
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label small fw-bold">Street Address (Line 1)</label>
                                        <input type="text" name="companyAddress1" class="form-control form-control-sm" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label small fw-bold">City / Area (Line 2)</label>
                                        <input type="text" name="companyAddress2" class="form-control form-control-sm" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">State</label>
                                        <input type="text" name="Company_State" list="indian-states" class="form-control form-control-sm" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Pin Code</label>
                                        <input type="text" name="Company_Pin" class="form-control form-control-sm" maxlength="6" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Phone Number</label>
                                        <input type="tel" name="companyPhone" class="form-control form-control-sm" minlength="10" maxlength="10" placeholder="10 Digits">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold">Email Address</label>
                                        <input type="email" name="Email" class="form-control form-control-sm">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label small fw-bold">Website</label>
                                        <input type="url" name="Website" class="form-control form-control-sm text-lowercase" placeholder="https://">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Tax & Statutory -->
                        <div class="col-md-5">
                            <div class="p-3 border rounded-3 bg-white h-100">
                                <h6 class="fw-bold text-primary small text-uppercase mb-3">Statutory & Tax</h6>
                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold">PAN (Income Tax)</label>
                                        <input type="text" name="PAN" class="form-control form-control-sm upper-case " pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" minlength="10" maxlength="10" required>
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold">GSTIN</label>
                                        <input type="text" name="GSTIN" class="form-control form-control-sm upper-case " pattern="[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}" minlength="15" maxlength="15" required>
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold">Tax Classification</label>
                                        <select class="form-select form-select-sm" name="taxClassification">
                                            <option>Regular Taxpayer</option>
                                            <option>Composition Scheme</option>
                                            <option>Unregistered Person</option>
                                        </select>
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold">FSSAI License No.</label>
                                        <input type="text" name="fssaiLicenseNumber" class="form-control form-control-sm">
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold">Import Export Code (IEC)</label>
                                        <input type="text" name="importExportCode" class="form-control form-control-sm" maxlength="10">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Banking -->
                        <div class="col-md-6">
                            <div class="p-3 border rounded-3 bg-white">
                                <h6 class="fw-bold text-primary small text-uppercase mb-3">Default Bank Details</h6>
                                <div class="row g-3">
                                    <div class="col-12"><label class="form-label small">Bank Name</label><input type="text" name="bankName" class="form-control form-control-sm proper-case"></div>
                                    <div class="col-md-6"><label class="form-label small">Account No.</label><input type="text" name="accountNumber" class="form-control form-control-sm "></div>
                                    <div class="col-md-6"><label class="form-label small">IFSC Code</label><input type="text" name="ifscCode" class="form-control form-control-sm upper-case"></div>
                                    <div class="col-md-6"><label class="form-label small">Branch Name</label><input type="text" name="bankBranch" class="form-control form-control-sm"></div>
                                    <div class="col-md-6"><label class="form-label small">Swift Code</label><input type="text" name="Swift_Code" class="form-control form-control-sm upper-case"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Legal & Signatory -->
                        <div class="col-md-6">
                            <div class="p-3 border rounded-3 bg-white">
                                <h6 class="fw-bold text-primary small text-uppercase mb-3">Legal & Signatory</h6>
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label small">Signatory Name</label><input type="text" name="signatoryName" class="form-control form-control-sm proper-case" required></div>
                                    <div class="col-md-6"><label class="form-label small">Designation</label><input type="text" name="designation" class="form-control form-control-sm" required></div>
                                    <div class="col-md-12"><label class="form-label small">Company CIN (Identification No.)</label><input type="text" name="registrationNumber" class="form-control form-control-sm upper-case "></div>
                                    <div class="col-md-6">
                                        <label class="form-label small">Legal Status</label>
                                        <select class="form-select form-select-sm" name="companyLegalStatus">
                                            <option>Private Limited</option><option>Public Limited</option><option>LLP</option><option>Sole Proprietorship</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small">ROC Office</label>
                                        <select class="form-select form-select-sm" name="registrationOffice">
                                            <option>ROC Delhi</option><option>ROC Mumbai</option><option>ROC Bangalore</option><option>ROC Kolkata</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
