<div class="animate-in">
    <form id="Stock" data-category="Masters" autocomplete="off">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-body p-0">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light">
                    <div>
                        <h5 class="fw-bold mb-0">Stock / Material Master</h5>
                        <p class="text-muted small mb-0">Manage products, services, and valuation rules</p>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm px-4 shadow-sm fw-bold">Register Item</button>
                </div>

                <div class="p-4">
                    <div class="row g-4">
                        <!-- Left: Core Logic -->
                        <div class="col-lg-8 border-end">
                            <h6 class="fw-bold text-primary small text-uppercase mb-3">Specification</h6>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">Stock Code (SKU)</label>
                                    <input type="text" name="Stock_Code" class="form-control form-control-sm font-monospace upper-case fw-bold" 
                                           data-check-unique="true" data-sheet_name="Stock" data-column_name="Stock_Code" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label small fw-bold">Item Display Name</label>
                                    <input type="text" name="itemName" class="form-control form-control-sm proper-case" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Item Description</label>
                                    <textarea name="Description" class="form-control form-control-sm" rows="2"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Item Group / Category</label>
                                    <input type="text" name="itemGroup" list="Stock-Group-List" class="form-control form-control-sm">
                                    <datalist id="Stock-Group-List"></datalist>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">HSN/SAC Code</label>
                                    <input type="text" name="itemHSN" class="form-control form-control-sm font-monospace" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Stock Type</label>
                                    <select name="StockType" class="form-select form-select-sm">
                                        <option value="Goods">Inventory Goods</option>
                                        <option value="Services">Services (Non-Inv)</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">Base Unit (UOM)</label>
                                    <input type="text" name="ItemUnit" list="units-list" class="form-control form-control-sm" required>
                                    <datalist id="units-list"><option value="Piece"><option value="Kg"><option value="Box"><option value="Set"></datalist>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">GST Rate (%)</label>
                                    <select name="ItemTax" class="form-select form-select-sm">
                                        <option value="0">0%</option><option value="5">5%</option><option value="12">12%</option><option value="18" selected>18%</option><option value="28">28%</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-danger">Reorder Level</label>
                                    <input type="number" name="minLevel" class="form-control form-control-sm" value="0">
                                </div>
                            </div>
                        </div>

                        <!-- Right: Valuation & Context -->
                        <div class="col-lg-4">
                            <h6 class="fw-bold text-primary small text-uppercase mb-3">Inventory Valuation</h6>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Linked Company</label>
                                    <input type="text" name="CompanyName" list="compList_stock" class="form-control form-control-sm" 
                                           data-fetch_column data-sheet_name="Companies" data-column_name="companyName & CompanyCode" required>
                                    <datalist id="compList_stock"></datalist>
                                </div>
                                <div class="col-12 mt-4 bg-light p-3 rounded-3">
                                    <label class="form-label small fw-bold text-success">Opening Balance</label>
                                    <div class="row g-2">
                                        <div class="col-6">
                                            <label class="small opacity-75">Qty</label>
                                            <input type="number" name="openingQty" class="form-control form-control-sm" value="0">
                                        </div>
                                        <div class="col-6">
                                            <label class="small opacity-75">Total Value</label>
                                            <input type="number" name="openingAmount" class="form-control form-control-sm" value="0">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
