<div class="animate-in">
    <form id="LedgerCreation" data-category="Masters" autocomplete="off">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-body p-0">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light">
                    <div>
                        <h5 class="fw-bold mb-0">General Ledger Creation</h5>
                        <p class="text-muted small mb-0">Add accounts to Chart of Accounts (COA)</p>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm px-4 shadow-sm fw-bold">Save Ledger</button>
                </div>

                <div class="p-4">
                    <!-- Identity Section -->
                    <h6 class="fw-bold text-primary small text-uppercase mb-3">Ledger Definition</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Ledger Code</label>
                            <input type="text" name="ledgerCode" class="form-control form-control-sm font-monospace upper-case fw-bold" 
                                   data-check-unique="true" data-sheet_name="LedgerCreation" data-column_name="ledgerCode" minlength="10" maxlength="10" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Account Display Name</label>
                            <input type="text" name="name" class="form-control form-control-sm proper-case" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Ledger Group</label>
                            <input type="text" name="ledgerType" list="led-groups" class="form-control form-control-sm" required>
                            <datalist id="led-groups">
                                <option value="Bank Accounts"><option value="Sundry Debtors"><option value="Sundry Creditors"><option value="Direct Incomes"><option value="Fixed Assets">
                            </datalist>
                        </div>
                    </div>

                    <!-- Context Section -->
                    <div class="bg-light p-3 rounded-3 mb-4">
                        <h6 class="fw-bold text-dark small text-uppercase mb-3">Organizational Linking</h6>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Parent Company</label>
                                <input type="text" name="CompanyName" list="compList_led" class="form-control form-control-sm" 
                                       data-fetch_column data-sheet_name="Companies" data-column_name="companyName&CompanyCode" required>
                                <datalist id="compList_led"></datalist>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Allocated Profit Center</label>
                                <input type="text" name="ProfitCenter" list="pcList_led" class="form-control form-control-sm" 
                                       data-fetch_column data-sheet_name="Projects" data-column_name="ProjectName&ProjectCode" required>
                                <datalist id="pcList_led"></datalist>
                            </div>
                        </div>
                    </div>

                    <!-- Address & Contact -->
                    <h6 class="fw-bold text-primary small text-uppercase mb-3">Communication (Optional)</h6>
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label small fw-bold">Address 1</label><input type="text" name="address1" class="form-control form-control-sm"></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">Address 2</label><input type="text" name="address2" class="form-control form-control-sm"></div>
                        <div class="col-md-4"><label class="form-label small fw-bold">State</label><input type="text" name="state" list="indian-states" class="form-control form-control-sm"></div>
                        <div class="col-md-2"><label class="form-label small fw-bold">PIN</label><input type="text" name="pin" class="form-control form-control-sm"></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">Email</label><input type="email" name="email" class="form-control form-control-sm"></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">GST</label><input type="text" name="GST" class="form-control form-control-sm"></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">Mobile</label><input type="tel" name="Mobile" class="form-control form-control-sm"></div>
                        <div class="col-md-12"><label class="form-label small fw-bold">Website</label><input type="url" name="website" class="form-control form-control-sm"></div>
                    </div>

                    <!-- Dynamic Fields Container -->
                    <div id="dynamicfeilds" class="mt-4"></div>
                </div>
            </div>
        </div>
    </form>
</div>
