<div class="card border-0 shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center p-3">
        <div class="d-flex align-items-center gap-2">
            <!-- <button class="btn btn-light border shadow-sm px-2" 
                    onclick="window.history.back()" 
                    title="Go Back">
                <i class="bi bi-arrow-left"></i>
            </button> -->
            <h5 class="fw-bold mb-0">
                <i class="bi bi-building me-2 text-primary"></i>Company Registry
            </h5>
        </div>
        <div>
            <button class="btn btn-sm btn-outline-secondary me-1" onclick="CompanyManager.LoadList()" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
            <button class="btn btn-primary btn-sm shadow-sm" onclick="CompanyManager.CreateNew()">
                <i class="bi bi-plus-lg me-1"></i> New Company
            </button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light text-muted small">
                <tr>
                    <th class="ps-4">Code</th>
                    <th>Company Name</th>
                    <th>Address</th>
                    <th>State</th>
                    <th>GSTIN</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
            </thead>
            <tbody id="companyListBody">
            </tbody>
        </table>
    </div>
</div>
<script>
// Company Form Handler with Back Button and Scroll Fix
const CompanyFormObserver = new MutationObserver((mutations) => {
    // Look for the Companies form
    const form = document.getElementById('Companies');
    
    if (form && !form.dataset.hydrated) {
        form.dataset.hydrated = "true";

        // --- FIX: Ensure scrolling works ---
        // Find and fix the container that might be restricting scroll
        const container = form.closest('.content-viewport') || 
                         form.closest('.main-content') || 
                         form.closest('.page-content') || 
                         form.closest('.card-body') ||
                         form.closest('.tab-pane') ||
                         form.parentElement;
        
        if (container) {
            container.style.overflow = 'visible !important';
            container.style.overflowY = 'visible !important';
            container.style.height = 'auto !important';
            container.style.maxHeight = 'none !important';
            container.style.minHeight = '100vh !important';
        }
        
        // Also fix any parent containers that might have overflow hidden
        let parent = form.parentElement;
        while (parent && parent !== document.body) {
            const computedStyle = window.getComputedStyle(parent);
            if (computedStyle.overflow === 'hidden' || computedStyle.overflowY === 'hidden') {
                parent.style.overflow = 'visible';
                parent.style.overflowY = 'visible';
            }
            if (computedStyle.maxHeight && computedStyle.maxHeight !== 'none') {
                parent.style.maxHeight = 'none';
            }
            parent = parent.parentElement;
        }
        
        // Ensure body can scroll
        document.body.style.overflow = 'auto';
        document.body.style.overflowY = 'auto';
        document.body.style.height = 'auto';
        document.documentElement.style.overflow = 'auto';
        document.documentElement.style.overflowY = 'auto';
        document.documentElement.style.height = 'auto';

        // --- ADD BACK BUTTON NEXT TO SUBMIT ---
        const submitBtn = form.querySelector('button[type="submit"]');
        if (submitBtn) {
            let backBtn = form.querySelector('#backToListBtn');
            if (!backBtn) {
                const btnGroup = document.createElement('div');
                btnGroup.className = 'd-flex gap-2 align-items-center';
                
                backBtn = document.createElement('button');
                backBtn.type = 'button';
                backBtn.id = 'backToListBtn';
                backBtn.className = 'btn btn-primary btn-sm shadow-sm fw-bold px-2 mb-0';
                backBtn.title = 'Back to List';
                backBtn.innerHTML = '<i class="bi bi-arrow-left"></i>';
                backBtn.onclick = function() {
    if (typeof App !== 'undefined' && App.Router) {
        App.Router('masters/company-list');
        // Load the list after navigation
        setTimeout(() => {
            if (typeof CompanyManager !== 'undefined' && CompanyManager.LoadList) {
                CompanyManager.LoadList();
            }
        }, 300);
    } else {
        window.location.href = '#masters/company-list';
        // Reload after hash change
        setTimeout(() => {
            if (typeof CompanyManager !== 'undefined' && CompanyManager.LoadList) {
                CompanyManager.LoadList();
            }
        }, 500);
    }
};

                submitBtn.parentNode.insertBefore(btnGroup, submitBtn);
                btnGroup.appendChild(backBtn);
                btnGroup.appendChild(submitBtn);
            }
        }

        // --- ADD BACK BUTTON IN CARD HEADER ---
        const cardHeader = form.closest('.card')?.querySelector('.card-header');
        if (cardHeader) {
            let headerBackBtn = cardHeader.querySelector('#headerBackBtn');
            if (!headerBackBtn) {
                headerBackBtn = document.createElement('button');
                headerBackBtn.type = 'button';
                headerBackBtn.id = 'headerBackBtn';
                headerBackBtn.className = 'btn btn-light border shadow-sm px-3 me-2';
                headerBackBtn.title = 'Back to List';
                headerBackBtn.innerHTML = '<i class="bi bi-arrow-left"></i>';
                headerBackBtn.onclick = function() {
                    if (typeof App !== 'undefined' && App.Router) {
                        App.Router('masters/company-list');
                    } else {
                        window.location.href = '#masters/company-list';
                    }
                };
                
                const title = cardHeader.querySelector('h5');
                if (title) {
                    cardHeader.insertBefore(headerBackBtn, title);
                } else {
                    cardHeader.prepend(headerBackBtn);
                }
            }
        }

        // 2. Check Memory for Edit Data
        const editContextStr = sessionStorage.getItem('EditContext_Companies');

        if (editContextStr) {
            const context = JSON.parse(editContextStr);
            const data = context.payload;

            // 3. Inject Hidden ID
            let hiddenId = form.querySelector('#companyHiddenId');
            if (!hiddenId) {
                hiddenId = document.createElement('input');
                hiddenId.type = 'hidden';
                hiddenId.id = 'companyHiddenId';
                hiddenId.name = 'hiddenRecordId';
                form.appendChild(hiddenId);
            }
            hiddenId.value = context.id;

            // 4. Auto-Fill the Inputs
            Object.keys(data).forEach(key => {
                const input = form.querySelector(`[name="${key}"]`);
                if (input) {
                    input.value = data[key] || '';
                }
            });

            // 5. Change Button to "Update"
            if (submitBtn) {
                submitBtn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>';
                submitBtn.classList.remove('btn-success');
                submitBtn.classList.add('btn-success');
            }

            // 6. Update Form Header
            const header = form.querySelector('h5');
            if (header) {
                header.innerHTML = '<i class="bi bi-pencil-square me-2"></i>Edit Company';
            }

            // 7. Clear Memory
            sessionStorage.removeItem('EditContext_Companies');
            
        } else {
            // Create mode
            const hiddenId = form.querySelector('#companyHiddenId');
            if (hiddenId) hiddenId.remove();
            
            form.reset();
            
            const header = form.querySelector('h5');
            if (header) {
                header.innerHTML = '<i class="bi bi-plus-circle me-2"></i>Create New Company';
            }
            
            if (submitBtn) {
                submitBtn.innerHTML = '<i class="bi bi-check2 me-1"></i> Create Company';
                submitBtn.classList.remove('btn-primary');
                submitBtn.classList.add('btn-success');
            }
        }

        // 8. Intercept Form Submission
        form.onsubmit = async function(e) {
            e.preventDefault();
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Processing...';
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());
            
            form.querySelectorAll('input[type="checkbox"]:not(:checked)').forEach(cb => {
                if (cb.name) payload[cb.name] = false;
            });
            
            const recordId = form.querySelector('#companyHiddenId')?.value;
            delete payload.hiddenRecordId;

            try {
                if (recordId) {
                    // --- UPDATE ---
                    let success = false;
                    
                    if (typeof API.UpdateTransaction === 'function') {
                        success = await API.UpdateTransaction(`Masters/${CompanyManager.DbSheet}`, recordId, payload);
                    } else {
                        const result = await API.Update(`Masters/${CompanyManager.DbSheet}/${recordId}`, payload);
                        success = result !== null && result !== undefined;
                    }
                    
                    if (!success) throw new Error("Update operation failed.");
                    
                    if (typeof App !== 'undefined' && App.UI && App.UI.Notify) {
                        App.UI.Notify('Success', 'Company Updated Successfully', 'success');
                    } else {
                        alert('Company Updated Successfully!');
                    }
                    
                } else {
                    // --- CREATE ---
                    payload.created_at = new Date().toISOString();
                    payload.updated_at = payload.created_at;
                    
                    const result = await API.Create(`Masters/${CompanyManager.DbSheet}`, payload);
                    
                    if (!result) throw new Error("Create operation failed.");
                    
                    if (typeof App !== 'undefined' && App.UI && App.UI.Notify) {
                        App.UI.Notify('Success', 'Company Created Successfully', 'success');
                    } else {
                        alert('Company Created Successfully!');
                    }
                }
                
                // Route back to list
                if (typeof App !== 'undefined' && App.Router) {
                    App.Router('masters/company-list');
                } else {
                    window.location.href = '#masters/company-list';
                }

            } catch (error) {
                console.error('Save Error:', error);
                if (typeof App !== 'undefined' && App.UI && App.UI.Notify) {
                    App.UI.Notify('Error', error.message || 'Save failed', 'danger');
                } else {
                    alert('Error saving data: ' + error.message);
                }
                submitBtn.innerHTML = originalHtml;
                submitBtn.disabled = false;
            }
        };
    }
});

// Start watching
CompanyFormObserver.observe(document.body, { childList: true, subtree: true });

CompanyManager.LoadList()
// Check immediately if form already exists
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('Companies');
    if (form && !form.dataset.hydrated) {
        setTimeout(() => {
            const formCheck = document.getElementById('Companies');
            if (formCheck && !formCheck.dataset.hydrated) {
                const event = new MutationEvent('DOMNodeInserted', { bubbles: true });
                document.body.dispatchEvent(event);
            }
        }, 100);
    }
});
</script>
<script>
const CompanyManager = {
    DbSheet: 'Companies',
    FormUrl: 'modules/masters/company-cw.html',
    
    // 1. Fetch and build the list
    async LoadList() {
        const tbody = document.getElementById('companyListBody');
        if (!tbody) return;
        
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary me-2"></div><span class="text-muted">Loading companies...</span></td></tr>';
        
        try {
            let rawResponse = await API.Fetch(`Masters/${this.DbSheet}`);
            let data = rawResponse?.data || rawResponse?.result || rawResponse;
            
            tbody.innerHTML = '';
            
            if (!data || Object.keys(data).length === 0) {
                return tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">
                    <i class="bi bi-building fs-3 d-block mb-2"></i>
                    No companies found. Create your first company!
                </td></tr>`;
            }

            const entries = Array.isArray(data) ? data.map((v, i) => [v.id || i, v]) : Object.entries(data);

            entries.forEach(([id, record]) => {
                if (!record || typeof record !== 'object') return;
                
                const encodedData = encodeURIComponent(JSON.stringify(record));
                const gstin = record.GSTIN || record.gstin || '-';
                const state = record.Company_State || record.companyState || record.state || '-';
                
                tbody.innerHTML += `
                    <tr class="company-row" data-id="${id}">
                        <td class="ps-4 fw-bold text-dark">${record.CompanyCode || record.companyCode || '-'}</td>
                        <td>${record.companyName || record.CompanyName || 'Unknown'}</td>
                        <td class="text-muted small">${record.companyAddress1 || ''} ${record.companyAddress2 || ''}</td>
                        <td class="text-muted small">${state}</td>
                        <td class="text-muted small">${gstin}</td>
                        <td class="text-end pe-4" style="white-space: nowrap;">
                            <button class="btn btn-sm btn-light text-primary border me-1" 
                                    onclick="CompanyManager.TriggerEdit('${id}', '${encodedData}')"
                                    title="Edit Company">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-light text-danger border" 
                                    onclick="CompanyManager.Delete('${id}', this)"
                                    title="Delete Company">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            // Update count
            const countEl = document.getElementById('companyCount');
            if (countEl) {
                countEl.innerText = `(${entries.length} records)`;
            }
            
        } catch (error) {
            console.error('Load Error:', error);
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Error loading companies: ${error.message}
            </td></tr>`;
        }
    },

    // 2. ROUTE TO CREATE MODE
    CreateNew() {
        sessionStorage.removeItem('EditContext_Companies');
        if (typeof App !== 'undefined' && App.Router) {
            App.Router('masters/company-cw');
        } else {
            window.location.href = '#masters/company-cw';
        }
    },

    // 3. ROUTE TO EDIT MODE
    TriggerEdit(recordId, encodedData) {
        const data = JSON.parse(decodeURIComponent(encodedData));
        
        sessionStorage.setItem('EditContext_Companies', JSON.stringify({
            id: recordId,
            payload: data
        }));

        if (typeof App !== 'undefined' && App.Router) {
            App.Router('masters/company-cw');
        } else {
            window.location.href = '#masters/company-cw';
        }
    },

    // 4. DELETE with confirmation
    async Delete(recordId, btn) {
        // Check if it's a system company
        try {
            const record = await API.Fetch(`Masters/${this.DbSheet}/${recordId}`);
            const data = record?.data || record?.result || record;
            
            const companyCode = data?.CompanyCode || data?.companyCode || '';
            const protectedCodes = ['SYS-COMP', 'SYS-TEST'];
            
            if (protectedCodes.includes(companyCode)) {
                if (typeof App !== 'undefined' && App.UI && App.UI.Notify) {
                    App.UI.Notify('Error', 'Cannot delete system company. This is a protected record.', 'danger');
                } else {
                    alert('Cannot delete system company.');
                }
                return;
            }
        } catch (e) {
            // Continue if can't fetch
        }
        
        if (!confirm('⚠️ Are you sure you want to delete this company?\n\nThis action cannot be undone!')) {
            return;
        }
        
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        btn.disabled = true;
        
        try {
            let success = false;
            
            if (typeof API.DeleteTransaction === 'function') {
                success = await API.DeleteTransaction(`Masters/${CompanyManager.DbSheet}`, recordId);
            } else {
                const result = await API.Delete(`Masters/${CompanyManager.DbSheet}/${recordId}`);
                success = result !== null && result !== undefined;
            }
            
            if (!success) throw new Error("Delete operation failed.");
            
            // Animate row removal
            const row = btn.closest('tr');
            if (row) {
                row.style.transition = 'all 0.3s ease';
                row.style.opacity = '0';
                setTimeout(() => row.remove(), 300);
            }
            
            if (typeof App !== 'undefined' && App.UI && App.UI.Notify) {
                App.UI.Notify('Success', 'Company deleted successfully', 'success');
            }
            
            // Refresh list after deletion
            setTimeout(() => CompanyManager.LoadList(), 500);
            
        } catch (error) {
            console.error('Delete Error:', error);
            if (typeof App !== 'undefined' && App.UI && App.UI.Notify) {
                App.UI.Notify('Error', error.message || 'Delete failed', 'danger');
            } else {
                alert('Delete failed: ' + error.message);
            }
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }
    },

    // 5. SEARCH/FILTER
    FilterList() {
        const query = document.getElementById('companySearchFilter')?.value?.toLowerCase() || '';
        const rows = document.querySelectorAll('#companyListBody tr.company-row');
        
        rows.forEach(row => {
            const code = row.querySelector('td:first-child')?.innerText?.toLowerCase() || '';
            const name = row.querySelector('td:nth-child(2)')?.innerText?.toLowerCase() || '';
            const address = row.querySelector('td:nth-child(3)')?.innerText?.toLowerCase() || '';
            const state = row.querySelector('td:nth-child(4)')?.innerText?.toLowerCase() || '';
            const gstin = row.querySelector('td:nth-child(5)')?.innerText?.toLowerCase() || '';
            
            const match = code.includes(query) || name.includes(query) || 
                         address.includes(query) || state.includes(query) || 
                         gstin.includes(query);
            row.style.display = match ? '' : 'none';
        });
    }
};



CompanyManager.LoadList()

</script>
