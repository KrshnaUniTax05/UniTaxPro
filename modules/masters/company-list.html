<div class="card border-0 shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center p-3 unitax-header">
        <div class="d-flex align-items-center gap-2">
            <!-- <button class="btn btn-light border shadow-sm px-2" 
                    onclick="window.history.back()" 
                    title="Go Back">
                <i class="bi bi-arrow-left"></i>
            </button> -->
            <h5 class="fw-bold mb-0">
                <i class="bi bi-building me-2 text-primary"></i>Company Registry
            </h5>
        </div>
        <div>
            <button class="btn btn-sm btn-outline-secondary me-1" onclick="CompanyManager.LoadList()" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
            <button class="btn btn-primary btn-sm shadow-sm" title="Create New Company" onclick="CompanyManager.CreateNew()">
                <i class="bi bi-plus-lg me-1"></i>
            </button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light text-muted small">
                <tr>
                    <th class="ps-4">Code</th>
                    <th>Company Name</th>
                    <th>Address</th>
                    <th>State</th>
                    <th>GSTIN</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
            </thead>
            <tbody id="companyListBody">
            </tbody>
        </table>
    </div>
</div>
<script>
// --- 1. GLOBAL MODULE CLEANUP (Prevents Identifier Crashes) ---
if (window.CompanyFormObserver) {
    window.CompanyFormObserver.disconnect();
}

// --- 2. COMPANY MANAGER DEFINITION ---
window.CompanyManager = {
    DbSheet: 'Companies',
    FormUrl: 'modules/masters/company-cw.html',
    data: [], 
    
    async LoadList(skipFetch = false) {
        const tbody = document.getElementById('companyListBody');
        if (!tbody) {
            if (typeof App !== 'undefined' && App.Router) App.Router('masters/company-list');
            // else window.location.href = '#masters/company-list';
            return;
        }
        
        if (!skipFetch) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary me-2"></div><span class="text-muted">Loading companies...</span></td></tr>';
            try {
                let rawResponse = await API.Fetch(`Masters/${this.DbSheet}`);
                let fetchedData = rawResponse?.data || rawResponse?.result || rawResponse;
                
                if (!fetchedData || Object.keys(fetchedData).length === 0) {
                    this.data = [];
                    return tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">
                        <i class="bi bi-building fs-3 d-block mb-2"></i>
                        No companies found. Create your first company!
                    </td></tr>`;
                }

                this.data = Array.isArray(fetchedData) 
                    ? fetchedData.map((v, i) => ({...v, ID: v.id || i})) 
                    : Object.entries(fetchedData).map(([id, val]) => ({...val, ID: id}));
                    
            } catch (error) {
                console.error('Load Error:', error);
                return tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i> Error loading companies: ${error.message}
                </td></tr>`;
            }
        }

        this.RenderList(this.data);
    },

    RenderList(dataArray) {
        const tbody = document.getElementById('companyListBody');
        if (!tbody) return;
        
        tbody.innerHTML = '';
        if (!dataArray || dataArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No companies available.</td></tr>`;
            const countEl = document.getElementById('companyCount');
            if (countEl) countEl.innerText = `(0 records)`;
            return;
        }

        dataArray.forEach((record) => {
            if (!record || typeof record !== 'object') return;
            const id = record.ID || record.id;
            const encodedData = encodeURIComponent(JSON.stringify(record));
            const gstin = record.GSTIN || record.gstin || '-';
            const state = record.Company_State || record.companyState || record.state || '-';
            
            tbody.innerHTML += `
                <tr class="company-row" data-id="${id}">
                    <td class="ps-4 fw-bold text-dark">${record.CompanyCode || record.companyCode || '-'}</td>
                    <td>${record.companyName || record.CompanyName || 'Unknown'}</td>
                    <td class="text-muted small">${record.companyAddress1 || ''} ${record.companyAddress2 || ''}</td>
                    <td class="text-muted small">${state}</td>
                    <td class="text-muted small">${gstin}</td>
                    <td class="text-end pe-4" style="white-space: nowrap;">
                        <button class="btn btn-sm btn-light text-primary border me-1" 
                                onclick="window.CompanyManager.TriggerEdit('${id}', '${encodedData}')"
                                title="Edit Company">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-light text-danger border" 
                                onclick="window.CompanyManager.Delete('${id}', this)"
                                title="Delete Company">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        const countEl = document.getElementById('companyCount');
        if (countEl) countEl.innerText = `(${dataArray.length} records)`;
    },

    CreateNew() {
        sessionStorage.removeItem('EditContext_Companies');
        if (typeof App !== 'undefined' && App.Router) App.Router('masters/company-cw');
        else window.location.href = '#masters/company-cw';
    },

    TriggerEdit(recordId, encodedData) {
        const data = JSON.parse(decodeURIComponent(encodedData));
        sessionStorage.setItem('EditContext_Companies', JSON.stringify({ id: recordId, payload: data }));

        if (typeof App !== 'undefined' && App.Router) App.Router('masters/company-cw');
        else window.location.href = '#masters/company-cw';
    },

    // 🔴 FIX 2: RE-VERIFY ACTIVE ROW ID FROM DATABASE BEFORE DELETION
    async Delete(recordId, btn) {
        const row = btn.closest('tr');
        const codeCell = row?.querySelector('td:first-child')?.innerText || '';
        if (['SYS-COMP', 'SYS-TEST'].includes(codeCell.trim())) {
            if (App?.UI?.Notify) App.UI.Notify('Error', 'Cannot delete a protected system company.', 'danger');
            return;
        }
        
        if (!confirm('⚠️ Are you sure you want to delete this company?\n\nThis action cannot be undone!')) return;
        
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        btn.disabled = true;
        
        try {
            // Live verification step to find if the key location shifted under the hood
            let finalDbKey = String(recordId).trim();
            const serverCheck = await API.Fetch(`Masters/${this.DbSheet}`);
            const liveData = serverCheck?.data || serverCheck?.result || serverCheck;
            
            if (liveData) {
                // Look up row key by matching a unique natural property (Company Code)
                const realServerKey = Object.keys(liveData).find(k => 
                    String(liveData[k]?.CompanyCode || liveData[k]?.companyCode).trim() === codeCell.trim()
                );
                if (realServerKey) {
                    finalDbKey = realServerKey;
                }
            }

            await API.SafeMasterDelete(this.DbSheet, finalDbKey);
            
            if (row) {
                row.style.transition = 'all 0.3s ease';
                row.style.opacity = '0';
                setTimeout(() => row.remove(), 300);
            }
            
            if (App?.UI?.Notify) App.UI.Notify('Success', 'Company deleted successfully', 'success');
            
            if (this.data) {
                this.data = this.data.filter(item => String(item.ID) !== String(finalDbKey));
                const countEl = document.getElementById('companyCount');
                if (countEl) countEl.innerText = `(${this.data.length} records)`;
            }
            
        } catch (error) {
            console.error('❌ Delete Error:', error);
            if (App?.UI?.Notify) App.UI.Notify('Error', error.message || 'Delete failed', 'danger');
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }
    },

    FilterList() {
        const query = document.getElementById('companySearchFilter')?.value?.toLowerCase() || '';
        const rows = document.querySelectorAll('#companyListBody tr.company-row');
        
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(query) ? '' : 'none';
        });
    }
};

// --- 3. OBSERVER: HYDRATE & FIX FORM ---
window.CompanyFormObserver = new MutationObserver((mutations) => {
    const form = document.getElementById('Companies');
    
    if (form && !form.dataset.hydrated) {
        form.dataset.hydrated = "true";

        // --- CSS OVERFLOW FIXES ---
        const container = form.closest('.content-viewport') || form.closest('.main-content') || form.closest('.page-content') || form.closest('.card-body') || form.closest('.tab-pane') || form.parentElement;
        if (container) {
            container.style.overflow = 'visible !important';
            container.style.overflowY = 'visible !important';
            container.style.height = 'auto !important';
            container.style.maxHeight = 'none !important';
            container.style.minHeight = '100vh !important';
        }
        
        let parent = form.parentElement;
        while (parent && parent !== document.body) {
            const computedStyle = window.getComputedStyle(parent);
            if (computedStyle.overflow === 'hidden' || computedStyle.overflowY === 'hidden') {
                parent.style.overflow = 'visible';
                parent.style.overflowY = 'visible';
            }
            if (computedStyle.maxHeight && computedStyle.maxHeight !== 'none') {
                parent.style.maxHeight = 'none';
            }
            parent = parent.parentElement;
        }
        
        document.body.style.overflow = 'auto';
        document.body.style.overflowY = 'auto';
        document.body.style.height = 'auto';
        document.documentElement.style.overflow = 'auto';
        document.documentElement.style.overflowY = 'auto';
        document.documentElement.style.height = 'auto';

        // --- ADD BACK BUTTON NEXT TO SUBMIT ---
        const submitBtn = form.querySelector('button[type="submit"]');
        if (submitBtn) {
            submitBtn.type = 'button'; 
            submitBtn.removeAttribute('onclick');
            form.removeAttribute('onsubmit');

            let backBtn = form.querySelector('#backToListBtn');
            if (!backBtn) {
                const btnGroup = document.createElement('div');
                btnGroup.className = 'd-flex gap-2 align-items-center';
                
                backBtn = document.createElement('button');
                backBtn.type = 'button';
                backBtn.id = 'backToListBtn';
                backBtn.className = 'btn btn-primary btn-sm shadow-sm fw-bold px-2 mb-0';
                backBtn.title = 'Back to List';
                backBtn.innerHTML = '<i class="bi bi-arrow-left"></i>';
                backBtn.onclick = () => window.CompanyManager.LoadList();

                submitBtn.parentNode.insertBefore(btnGroup, submitBtn);
                btnGroup.appendChild(backBtn);
                btnGroup.appendChild(submitBtn);
            }
        }

        // --- ADD BACK BUTTON IN CARD HEADER ---
        const cardHeader = form.closest('.card')?.querySelector('.card-header');
        if (cardHeader) {
            let headerBackBtn = cardHeader.querySelector('#headerBackBtn');
            if (!headerBackBtn) {
                headerBackBtn = document.createElement('button');
                headerBackBtn.type = 'button';
                headerBackBtn.id = 'headerBackBtn';
                headerBackBtn.className = 'btn btn-light border shadow-sm px-3 me-2';
                headerBackBtn.title = 'Back to List';
                headerBackBtn.innerHTML = '<i class="bi bi-arrow-left"></i>';
                headerBackBtn.onclick = () => window.CompanyManager.LoadList();
                
                const title = cardHeader.querySelector('h5');
                if (title) cardHeader.insertBefore(headerBackBtn, title);
                else cardHeader.prepend(headerBackBtn);
            }
        }

        // --- EDIT CONTEXT MEMORY CHECK ---
        const editContextStr = sessionStorage.getItem('EditContext_Companies');

        if (editContextStr) {
            const context = JSON.parse(editContextStr);
            const data = context.payload;

            let hiddenId = form.querySelector('#companyHiddenId');
            if (!hiddenId) {
                hiddenId = document.createElement('input');
                hiddenId.type = 'hidden';
                hiddenId.id = 'companyHiddenId';
                hiddenId.name = 'hiddenRecordId';
                form.appendChild(hiddenId);
            }
            hiddenId.value = context.id;

            Object.keys(data).forEach(key => {
                const input = form.querySelector(`[name="${key}"]`);
                if (input) input.value = data[key] || '';
            });

            if (submitBtn) {
                submitBtn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i> ';
                submitBtn.title = 'Update Data';
                submitBtn.classList.remove('btn-primary');
                submitBtn.classList.add('btn-success');
            }

            const header = form.querySelector('h5');
            if (header) header.innerHTML = '<i class="bi bi-pencil-square me-2"></i>Edit Company';

            sessionStorage.removeItem('EditContext_Companies');
            
        } else {
            form.querySelector('#companyHiddenId')?.remove();
            form.reset();
            
            const header = form.querySelector('h5');
            if (header) header.innerHTML = '<i class="bi bi-plus-circle me-2"></i>Create New Company';
            
            if (submitBtn) {
                submitBtn.innerHTML = '<i class="bi bi-check2 me-1"></i> Create Company';
                submitBtn.classList.remove('btn-success');
                submitBtn.classList.add('btn-primary');
            }
        }

        // --- BULLETPROOF SUBMISSION CLICK HANDLER ---
        if (submitBtn) {
            window.SaveMaster = (e) => { 
                if (e) e.preventDefault(); 
                return false; 
            };

            submitBtn.onclick = async function (e) {
                e.preventDefault();

                const originalHtml = submitBtn.innerHTML;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Processing...';
                submitBtn.disabled = true;

                try {
                    const formData = new FormData(form);
                    const payload = Object.fromEntries(formData.entries());

                    form.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                        payload[cb.name] = cb.checked;
                    });

                    const hiddenInput = form.querySelector("#companyHiddenId");
                    const rawRecordId = hiddenInput ? hiddenInput.value.trim() : "";
                    let recordId = (rawRecordId && rawRecordId !== 'undefined' && rawRecordId !== 'null') ? rawRecordId : null;

                    delete payload.hiddenRecordId;
                    delete payload.companyHiddenId;
                    payload.updated_at = new Date().toISOString();

                    // 🔴 FIX 1: MATCH CURRENT ROW ID IN LIVE DATA BASELINE BEFORE SAVING
                    const targetCode = String(payload.CompanyCode || payload.companyCode || '').trim();
                    const liveServerCheck = await API.Fetch(`Masters/${window.CompanyManager.DbSheet}`);
                    const masterNode = liveServerCheck?.data || liveServerCheck?.result || liveServerCheck;
                    
                    if (masterNode && targetCode) {
                        const directMatchId = Object.keys(masterNode).find(key => 
                            String(masterNode[key]?.CompanyCode || masterNode[key]?.companyCode).trim() === targetCode
                        );
                        if (directMatchId) {
                            recordId = directMatchId; // Always prioritize actual dynamic index from server
                        }
                    }

                    // ===========================
                    // EXECUTE MASTER WORK
                    // ===========================
                    if (recordId) {
                        await API.SecureMasterUpdate(window.CompanyManager.DbSheet, recordId, payload);
                        if (App?.UI?.Notify) App.UI.Notify("Success", "Company Updated Successfully", "success");
                    } else {
                        payload.created_at = payload.updated_at;
                        await API.SaveMaster(`${window.CompanyManager.DbSheet}`, payload);
                        if (App?.UI?.Notify) App.UI.Notify("Success", "Company Created Successfully", "success");
                    }

                    window.CompanyManager.LoadList();

                } catch (error) {
                    console.error("Save Error:", error);
                    if (App?.UI?.Notify) App.UI.Notify("Error", error.message || "Save failed", "danger");
                    
                    submitBtn.innerHTML = originalHtml;
                    submitBtn.disabled = false;
                }
            };
        }
    }
});

// Start watching DOM changes
window.CompanyFormObserver.observe(document.body, { childList: true, subtree: true });

// Load initial data
window.CompanyManager.LoadList();
</script>
