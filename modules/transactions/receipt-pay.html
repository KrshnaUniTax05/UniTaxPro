<div class="animate-in">
    <form id="ReceiptPaymentForm" data-category="Transactions">
        <input type="hidden" name="documentType" id="rp_docType" value="RECEIPT">
        
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light sticky-top z-10">
                    <div class="d-flex align-items-center gap-3">
                        <h5 class="fw-bold mb-0">Cash & Bank Book</h5>
                        <div class="btn-group btn-group-sm border shadow-sm">
                            <input type="radio" class="btn-check" name="vtype" id="v_rec" checked onchange="setRP('RECEIPT')">
                            <label class="btn btn-outline-success" for="v_rec">Receipt</label>
                            <input type="radio" class="btn-check" name="vtype" id="v_pay" onchange="setRP('PAYMENT')">
                            <label class="btn btn-outline-danger" for="v_pay">Payment</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm px-4 shadow-sm fw-bold">Post Entry</button>
                </div>

                <div class="p-4">
                    <div class="row g-3 bg-white p-3 border rounded-3 mb-4 shadow-sm">
                        <div class="col-md-5 border-end">
                            <label class="form-label small fw-bold text-success" id="accLabel">Deposit Into (Bank/Cash)</label>
                            <input type="text" name="gl_account" class="form-control form-control-sm font-monospace" 
                                   list="rpAccList" placeholder="Search Account..." required 
                                   data-fetch_column data-sheet_name="LedgerCreation" data-column_name="ledgerCode&name">
                            <datalist id="rpAccList"></datalist>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Ref No / Instrument</label>
                            <input type="text" name="paymentRef" class="form-control form-control-sm" placeholder="UTR/Chq/Cash">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Date</label>
                            <input type="date" id="rp_date" name="voucher_date" class="form-control form-control-sm" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Project</label>
                            <input type="text" name="project" list="pcListRP" class="form-control form-control-sm" data-fetch_column data-sheet_name="Projects" data-column_name="ProjectName">
                            <datalist id="pcListRP"></datalist>
                        </div>
                    </div>

                    <table class="table table-sm table-hover border rounded-3" id="rpTable">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-3" width="5%">#</th>
                                <th width="45%">Offsetting Account (Party/Expense)</th>
                                <th width="35%">Line Narration</th>
                                <th width="15%" class="text-end pe-3">Amount</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="rpBody">
                            <tr>
                                <td class="ps-3 sr-no">1</td>
                                <td>
                                    <input type="text" name="offset_account[]" class="form-control form-control-sm border-0 bg-transparent" 
                                           data-fetch_column data-sheet_name="LedgerCreation" data-column_name="name&ledgerCode" list="offsetList" required>
                                    <datalist id="offsetList"></datalist>
                                </td>
                                <td><input type="text" name="row_narration[]" class="form-control form-control-sm border-0 bg-transparent"></td>
                                <td><input type="number" name="amount[]" class="form-control form-control-sm border-0 text-end fw-bold r_amt" placeholder="0.00"></td>
                                <td class="text-center"><button type="button" class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove(); calcRP();">&times;</button></td>
                            </tr>
                        </tbody>
                    </table>
                    <button type="button" class="btn btn-white btn-sm border mt-2" onclick="Utils.AddGridRow('rpTable')">+ Add Split Entry</button>
                    
                    <div class="text-end border-top mt-4 pt-3">
                        <span class="text-muted small me-3 fw-bold">TOTAL VOUCHER VALUE:</span>
                        <span class="h4 fw-bold">₹ <span id="rp_total">0.00</span></span>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    document.getElementById('rp_date').valueAsDate = new Date();

    function setRP(type) {
        document.getElementById('rp_docType').value = type;
        const lbl = document.getElementById('accLabel');
        if(type === 'RECEIPT') {
            lbl.innerText = "Deposit Into (Bank/Cash)";
            lbl.className = "form-label small fw-bold text-success";
        } else {
            lbl.innerText = "Withdraw From (Bank/Cash)";
            lbl.className = "form-label small fw-bold text-danger";
        }
    }

    function calcRP() {
        let t = 0;
        document.querySelectorAll('.r_amt').forEach(el => t += parseFloat(el.value) || 0);
        document.getElementById('rp_total').innerText = t.toLocaleString('en-IN', {minimumFractionDigits: 2});
    }

    document.getElementById('rpBody').addEventListener('input', calcRP);
</script>
