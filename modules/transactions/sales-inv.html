<div class="animate-in">
    <form id="SalesInvoiceForm" data-category="Transactions">
        <input type="hidden" name="documentType" value="SALE">

        <div class="card border-0 shadow-sm overflow-hidden">
            <!-- ERP Command Header -->
            <div class="card-body p-0">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light sticky-top z-10">
                    <div>
                        <h5 class="fw-bold mb-0 text-dark">Sales Invoice</h5>
                        <p class="text-muted small mb-0">Tax Invoice / Bill of Supply</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="button" title="Additional Information" class="btn btn-secondary btn-sm shadow-sm" data-bs-toggle="offcanvas" data-bs-target="#additionalDetails">
                            <i class="bi bi-truck "></i>
                        </button>
                        <!-- <button type="button" class="btn btn-white btn-sm border fw-semibold" onclick="App.Router('transactions/sales-inv')">Reset</button> -->
                        <button type="submit" title="Post Document" class="btn btn-success btn-sm shadow-sm fw-bold px-3 ">
                            <i class="bi bi-check2 me-1"></i>
                        </button>
                    </div>
                </div>

                <div class="p-4">
                    <!-- Header: Buyer & Meta -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-4 border-end pe-4">
                            <label class="form-label small fw-bold text-primary">Buyer (Bill To)</label>
                            <input type="text" name="customer_ledger" 
                                   class="form-control form-control-sm mb-2" 
                                   placeholder="Search Customer..." 
                                   data-fetch_column data-sheet_name="LedgerCreation" data-column_name="name & ledgerCode" 
                                   list="customerList" required>
                            <datalist id="customerList"></datalist>
                            
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="badge-xs text-muted">GSTIN</label>
                                    <input type="text" name="auto_customer_ledger_GST" class="form-control form-control-sm bg-light border-0 px-2" readonly>
                                </div>
                                <div class="col-6">
                                    <label class="badge-xs text-muted">Place of Supply</label>
                                    <input type="text" name="auto_customer_ledger_state" class="form-control form-control-sm bg-light border-0 px-2" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-8 ps-4">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Invoice No.</label>
                                    <input type="text" name="Invoice" id="invNoDisplay" class="form-control form-control-sm  fw-bold bg-white" readonly>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Billing Date</label>
                                    <input type="date" name="voucher_date" id="invDate" class="form-control form-control-sm" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Project/PC</label>
                                    <input type="text" name="project" list="Projectlist" class="form-control form-control-sm upper-case" 
                                           data-fetch_column data-sheet_name="Projects" data-column_name="ProjectName & ProjectCode" placeholder="General">
                                    <datalist id="Projectlist"></datalist>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Supply Type</label>
                                    <select name="pos" class="form-select form-select-sm">
                                        <option value="INTRA">Intra-State</option>
                                        <option value="INTER">Inter-State</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Item Grid -->
                    <div class="border rounded-3 overflow-hidden mb-4">
                        <table class="table table-sm table-hover mb-0 align-middle" id="salesItemTable">
                            <thead class="table-dark">
                                <tr>
                                    <th class="ps-3" width="5%">#</th>
                                    <th width="40%">Item / Service Description</th>
                                    <th width="10%">Qty</th>
                                    <th width="15%">Rate</th>
                                    <th width="10%">Tax %</th>
                                    <th class="text-end pe-3" width="15%">Total</th>
                                    <th width="5%"></th>
                                </tr>
                            </thead>
                            <tbody id="salesItemBody">
                                <tr>
                                    <td class="sr-no ps-3">1</td>
                                    <td>
                                        <input type="text" name="item_name[]" 
                                               class="form-control form-control-sm border-0 bg-transparent itemName" 
                                               placeholder="Select SKU/Item..." 
                                               data-fetch_column data-sheet_name="Stock" data-column_name="itemName & Stock_Code" 
                                               list="stockList" required>
                                        <datalist id="stockList"></datalist>
                                        <div class="d-flex gap-2 opacity-50 px-1" style="font-size: 9px;">
                                            
                                            <span>HSN: <input type="text" name="auto_item_name_itemHSN" class="border-0 bg-transparent p-0" style="width:60px" readonly></span>
                                            <span>Tax Code: <input type="text" name="auto_item_name_ItemTax" class="border-0 bg-transparent p-0 tax-val" style="width:10px" readonly>%</span>
                                        </div>
                                    </td>
                                    <td><input type="text" name="qty[]" class="form-control form-control-sm border-0 bg-transparent qty text-center" value="1"></td>
                                    <td><input type="text" name="rate[]" class="form-control form-control-sm border-0 bg-transparent rate text-end" placeholder="0.00"></td>
                                    <td><input type="text" class="form-control form-control-sm border-0 bg-transparent text-center tax-display" readonly></td>
                                    <td class="text-end pe-3 fw-bold"><span class="line-total">0.00</span></td>
                                    <td class="text-center"><button type="button" class="btn btn-link btn-sm text-danger p-0" onclick="removeRow(this)"><i class="bi bi-trash"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="p-2 bg-light border-top">
                            <button type="button" class="btn btn-white btn-sm border shadow-sm px-3" onclick="addNewRow()">+ Add Line Item</button>
                        </div>
                    </div>

                    <!-- Footer Totals -->
                    <div class="row justify-content-end">
                        <div class="col-md-4">
                            <div class="card bg-light border-0">
                                <div class="card-body p-3">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted small fw-bold">TAXABLE VALUE</span>
                                        <span class="fw-bold" id="taxable-total">0.00</span>
                                    </div>
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted small fw-bold">TOTAL TAX</span>
                                        <span class="fw-bold" id="gst-total">0.00</span>
                                    </div>
                                    <hr class="my-2">
                                    <div class="d-flex justify-content-between">
                                        <span class="text-primary fw-bold">NET AMOUNT</span>
                                        <span class="h5 fw-bold text-primary mb-0">₹ <span id="grand-total">0.00</span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="offcanvas offcanvas-start" tabindex="-1" id="additionalDetails" style="width: 1000px !important; border-left: 1px solid var(--border-color);">
            <div class="offcanvas-header bg-dark text-white" style="padding: 15px 20px;">
                <h5 class="offcanvas-title fw-bold" style="font-size: 1.1rem;"><i class="bi bi-box-seam me-2"></i> Shipping & Order Details</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            
            <div class="offcanvas-body" style="background-color: var(--bg-light); padding: 20px;">
                
                <section class="mb-4">
                    <p class="fw-bold text-primary small text-uppercase mb-2"><i class="bi bi-person-lines-fill me-1"></i> Consignee (Ship To)</p>
                    <div class="bg-white p-3 rounded border shadow-sm">
                        <input type="text" name="consignee_name" class="form-control form-control-sm mb-2 fw-bold" placeholder="Consignee Name">
                        <textarea name="delivery_address" class="form-control form-control-sm mb-2" rows="2" placeholder="Complete Shipping Address"></textarea>
                        <div class="row g-2 mb-2">
                            <div class="col-6"><input type="text" name="delivery_state" class="form-control form-control-sm" placeholder="State"></div>
                            <div class="col-6"><input type="text" name="delivery_pin" class="form-control form-control-sm" placeholder="PIN Code"></div>
                        </div>
                        <div class="row g-2">
                            <div class="col-6"><input type="text" name="delivery_phone" class="form-control form-control-sm" placeholder="Contact Phone"></div>
                            <div class="col-6"><input type="email" name="delivery_email" class="form-control form-control-sm" placeholder="Email Address"></div>
                        </div>
                    </div>
                </section>

                <section class="mb-4">
                    <p class="fw-bold text-primary small text-uppercase mb-2"><i class="bi bi-cart-check me-1"></i> Order Details</p>
                    <div class="bg-white p-3 rounded border shadow-sm">
                        <div class="row g-3 mb-2">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Order No(s)</label>
                                <input type="text" name="order_no" class="form-control form-control-sm" placeholder="e.g. ORD-123">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Mode/Terms of Payment</label>
                                <input type="text" name="terms_of_payment" class="form-control form-control-sm" placeholder="e.g. COD / Net 30">
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Other References</label>
                                <input type="text" name="other_references" class="form-control form-control-sm">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Terms of Delivery</label>
                                <input type="text" name="terms_of_delivery" class="form-control form-control-sm">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="mb-4">
                    <p class="fw-bold text-primary small text-uppercase mb-2"><i class="bi bi-truck me-1"></i> Dispatch Details</p>
                    <div class="bg-white p-3 rounded border shadow-sm">
                        <div class="row g-3 mb-2">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Delivery Note No(s)</label>
                                <input type="text" name="delivery_note_no" class="form-control form-control-sm">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Dispatch Doc No.</label>
                                <input type="text" name="dispatch_doc_no" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="row g-3 mb-2">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Dispatched through</label>
                                <input type="text" name="dispatched_through" class="form-control form-control-sm" placeholder="e.g. Amazon Shipping">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Destination</label>
                                <input type="text" name="destination" class="form-control form-control-sm" placeholder="e.g. Gorakhpur">
                            </div>
                        </div>
                        <div class="row g-3 mb-2">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Carrier Name/Agent</label>
                                <input type="text" name="carrier_agent" class="form-control form-control-sm">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Vehicle No.</label>
                                <input type="text" name="vehicle_no" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Bill of Lading / LR-RR No.</label>
                                <input type="text" name="lr_no" class="form-control form-control-sm">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">LR Date</label>
                                <input type="date" name="lr_date" class="form-control form-control-sm">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="mb-4">
                    <p class="fw-bold text-primary small text-uppercase mb-2"><i class="bi bi-globe me-1"></i> Export Details</p>
                    <div class="bg-white p-3 rounded border shadow-sm">
                        <div class="row g-3 mb-2">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Place of Receipt by Shipper</label>
                                <input type="text" name="place_of_receipt" class="form-control form-control-sm">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Vessel / Flight No.</label>
                                <input type="text" name="vessel_flight_no" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="row g-3 mb-2">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Port of Loading</label>
                                <input type="text" name="port_of_loading" class="form-control form-control-sm">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Port of Discharge</label>
                                <input type="text" name="port_of_discharge" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="row g-3 mb-2">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Country to</label>
                                <input type="text" name="country_to" class="form-control form-control-sm">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Port Code</label>
                                <input type="text" name="port_code" class="form-control form-control-sm">
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Shipping Bill No.</label>
                                <input type="text" name="shipping_bill_no" class="form-control form-control-sm">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted fw-bold">Shipping Date</label>
                                <input type="date" name="shipping_bill_date" class="form-control form-control-sm">
                            </div>
                        </div>
                    </div>
                </section>

                <div class="position-sticky bottom-0 bg-light py-2 border-top mt-4" style="z-index: 10;">
                    <button type="button" class="btn btn-primary w-100 fw-bold shadow-sm" data-bs-dismiss="offcanvas" onclick="App.UI.Notify('Info', 'Additional Details captured. They will be saved when you submit the voucher.', 'info')">
                        <i class="bi bi-check2-circle me-1"></i> Apply Additional Details
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    document.getElementById('invNoDisplay').value = Utils.GenerateDocID('SL');
    document.getElementById('invDate').valueAsDate = new Date();

    function addNewRow() {
        const tr = Utils.AddGridRow('salesItemTable');
        if(tr) App.InitERPLogic('transactions/sales-inv'); 
    }

    function removeRow(btn) {
        if(document.querySelectorAll('#salesItemBody tr').length > 1) {
            btn.closest('tr').remove();
            recalculateVoucher();
        }
    }

    function recalculateVoucher() {
        let taxable = 0; let totalGst = 0;
        document.querySelectorAll('#salesItemBody tr').forEach(row => {
            const q = parseFloat(row.querySelector('.qty').value) || 0;
            const r = parseFloat(row.querySelector('.rate').value) || 0;
            const t = parseFloat(row.querySelector('.tax-val').value) || 0;
            
            const line = Utils.CalculateLine(q, r, t);
            row.querySelector('.line-total').innerText = line.total.toLocaleString('en-IN', {minimumFractionDigits: 2});
            row.querySelector('.tax-display').value = t + "%";
            
            taxable += line.base; totalGst += line.tax;
        });
        document.getElementById('taxable-total').innerText = taxable.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('gst-total').innerText = totalGst.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('grand-total').innerText = (taxable + totalGst).toLocaleString('en-IN', {minimumFractionDigits: 2});
    }

    document.getElementById('salesItemBody').addEventListener('input', recalculateVoucher);
</script>
