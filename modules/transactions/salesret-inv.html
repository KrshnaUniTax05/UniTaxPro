<div class="animate-in">
    <form id="SalesReturnForm" data-category="Transactions">
        <input type="hidden" name="documentType" value="CREDITNOTE">

        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-body p-0">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light sticky-top z-10 unitax-header">
                    <div>
                        <h5 class="fw-bold mb-0 text-dark">Credit Note (Sales Return)</h5>
                        <p class="text-muted small mb-0">Statutory Credit Note Document</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="button" title="Additional Information" class="btn btn-secondary btn-sm shadow-sm" data-bs-toggle="offcanvas" data-bs-target="#additionalDetails">
                            <i class="bi bi-truck "></i>
                        </button>
                        <button type="submit" title="Post Document" class="btn btn-success btn-sm shadow-sm fw-bold px-3 ">
                            <i class="bi bi-check2 me-1"></i>
                        </button>
                    </div>
                </div>

                <div class="p-4">
                    <div class="row g-3 mb-4 bg-light p-3 rounded border">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-danger">Original Invoice No.</label>
                            <input type="text" name="original_invoice_no" list="originalSalesList" class="form-control form-control-sm border-danger" required placeholder="Select Original Invoice...">
                            <datalist id="originalSalesList"></datalist>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-danger">Original Invoice Date</label>
                            <input type="date" name="original_invoice_date" class="form-control form-control-sm border-danger" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Reason for Issuance</label>
                            <select name="return_reason" class="form-select form-select-sm">
                                <option value="01-Sales Return">01 - Sales Return</option>
                                <option value="02-Post Sale Discount">02 - Post Sale Discount</option>
                                <option value="03-Deficiency in Service">03 - Deficiency in Service</option>
                                <option value="04-Correction in Invoice">04 - Correction in Invoice</option>
                                <option value="05-Change in POS">05 - Change in POS</option>
                                <option value="07-Others">07 - Others</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4 border-end pe-4">
                            <label class="form-label small fw-bold text-primary">Customer (Credit To)</label>
                            <input type="text" name="customer_ledger" 
                                   class="form-control form-control-sm mb-2" 
                                   placeholder="Search Customer..." 
                                   data-fetch_column data-sheet_name="LedgerCreation" data-column_name="name & ledgerCode" 
                                   list="customerList" required>
                            <datalist id="customerList"></datalist>
                            
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="badge-xs text-muted">GSTIN</label>
                                    <input type="text" name="auto_customer_ledger_GST" class="form-control form-control-sm bg-light border-0 px-2" readonly>
                                </div>
                                <div class="col-6">
                                    <label class="badge-xs text-muted">Place of Supply</label>
                                    <input type="text" name="auto_customer_ledger_state" class="form-control form-control-sm bg-light border-0 px-2" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-8 ps-4">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Credit Note No.</label>
                                    <input type="text" name="Invoice" id="crnNoDisplay" class="form-control form-control-sm fw-bold bg-white" readonly>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Document Date</label>
                                    <input type="date" name="voucher_date" id="crnDate" class="form-control form-control-sm" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Project/PC</label>
                                    <input type="text" name="project" list="Projectlist" class="form-control form-control-sm upper-case" 
                                           data-fetch_column data-sheet_name="Projects" data-column_name="ProjectName & ProjectCode" placeholder="General">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold">Supply Type</label>
                                    <select name="pos" class="form-select form-select-sm">
                                        
                                        <optgroup label="Domestic (Tax Auto-Computed)">
                                            <option value="REGULAR" selected>Regular Sale</option>
                                        </optgroup>

                                        <optgroup label="Exports">
                                            <option value="EXP_WPAY">Export (With Payment of Tax)</option>
                                            <option value="EXP_WOPAY">Export (Without Payment of Tax)</option>
                                        </optgroup>

                                        <optgroup label="SEZ & Deemed Exports">
                                            <option value="SEZ_WPAY">SEZ Supplies (With Payment of Tax)</option>
                                            <option value="SEZ_WOPAY">SEZ Supplies (Without Payment of Tax)</option>
                                            <option value="DEEMED">Deemed Exports</option>
                                        </optgroup>

                                        <optgroup label="Zero / Nil / Exempt">
                                            <option value="NIL">Nil Rated Supplies</option>
                                            <option value="EXEMPT">Exempted Supplies</option>
                                            <option value="NONGST">Non-GST Supplies</option>
                                        </optgroup>
                                        
                                    </select>
                                </div>
                            </div>
                            <div class="row pt-2">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Narration</label>
                                    <input type="text" name="narration"  class="form-control form-control-sm" >
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="border rounded-3 overflow-hidden mb-4">
                        <table class="table table-sm table-hover mb-0 align-middle" id="salesReturnItemTable">
                            <thead class="table-dark">
                                <tr>
                                    <th class="ps-3" width="5%">#</th>
                                    <th width="40%">Item / Service Description</th>
                                    <th width="10%">Qty Returned</th>
                                    <th width="15%">Rate</th>
                                    <th width="10%">Tax %</th>
                                    <th class="text-end pe-3" width="15%">Total</th>
                                    <th width="5%"></th>
                                </tr>
                            </thead>
                            <tbody id="salesReturnItemBody">
                                <tr>
                                    <td class="sr-no ps-3">1</td>
                                    <td>
                                        <input type="text" name="item_name[]" 
                                               class="form-control form-control-sm border-0 bg-transparent itemName" 
                                               placeholder="Select SKU/Item..." 
                                               data-fetch_column data-sheet_name="Stock" data-column_name="itemName & Stock_Code" 
                                               list="stockList" required>
                                        <div class="d-flex gap-2 opacity-50 px-1" style="font-size: 9px;">
                                            <span>HSN: <input type="text" name="auto_item_name_itemHSN" class="border-0 bg-transparent p-0" style="width:60px" readonly></span>
                                            <span>Tax Code: <input type="text" name="auto_item_name_ItemTax" class="border-0 bg-transparent p-0 tax-val" style="width:10px" readonly>%</span>
                                        </div>
                                    </td>
                                    <td><input type="text" name="qty[]" class="form-control form-control-sm border-0 bg-transparent qty text-center" value="1"></td>
                                    <td><input type="text" name="rate[]" class="form-control form-control-sm border-0 bg-transparent rate text-end" placeholder="0.00"></td>
                                    <td><input type="text" class="form-control form-control-sm border-0 bg-transparent text-center tax-display" readonly></td>
                                    <td class="text-end pe-3 fw-bold"><span class="line-total">0.00</span></td>
                                    <td class="text-center"><button type="button" class="btn btn-link btn-sm text-danger p-0" onclick="removeCrnRow(this)"><i class="bi bi-trash"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="p-2 bg-light border-top">
                            <button type="button" class="btn btn-white btn-sm border shadow-sm px-3" onclick="addNewCrnRow()">+ Add Line Item</button>
                        </div>
                    </div>

                    <div class="row justify-content-end">
                        <div class="col-md-4">
                            <div class="card bg-light border-0">
                                <div class="card-body p-3">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted small fw-bold">TAXABLE VALUE</span>
                                        <span class="fw-bold" id="crn-taxable-total">0.00</span>
                                    </div>
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted small fw-bold">TOTAL TAX</span>
                                        <span class="fw-bold" id="crn-gst-total">0.00</span>
                                    </div>
                                    <hr class="my-2">
                                    <div class="d-flex justify-content-between">
                                        <span class="text-primary fw-bold">CREDIT AMOUNT</span>
                                        <span class="h5 fw-bold text-primary mb-0">₹ <span id="crn-grand-total">0.00</span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </form>
</div>

<script>
    document.getElementById('crnNoDisplay').value = Utils.GenerateDocID('CRN');
    document.getElementById('crnDate').valueAsDate = new Date();

    function addNewCrnRow() {
        const tr = Utils.AddGridRow('salesReturnItemTable');
        if(tr) App.InitERPLogic('transactions/sales-return'); 
    }

    function removeCrnRow(btn) {
        if(document.querySelectorAll('#salesReturnItemBody tr').length > 1) {
            btn.closest('tr').remove();
            recalculateCrnVoucher();
        }
    }

    function recalculateCrnVoucher() {
        let taxable = 0; let totalGst = 0;
        document.querySelectorAll('#salesReturnItemBody tr').forEach(row => {
            const q = parseFloat(row.querySelector('.qty').value) || 0;
            const r = parseFloat(row.querySelector('.rate').value) || 0;
            const t = parseFloat(row.querySelector('.tax-val').value) || 0;
            
            const line = Utils.CalculateLine(q, r, t);
            row.querySelector('.line-total').innerText = line.total.toLocaleString('en-IN', {minimumFractionDigits: 2});
            row.querySelector('.tax-display').value = t + "%";
            
            taxable += line.base; totalGst += line.tax;
        });
        document.getElementById('crn-taxable-total').innerText = taxable.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('crn-gst-total').innerText = totalGst.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById('crn-grand-total').innerText = (taxable + totalGst).toLocaleString('en-IN', {minimumFractionDigits: 2});
    }

    document.getElementById('salesReturnItemBody').addEventListener('input', recalculateCrnVoucher);
</script>
<script>
(async function InitReturnAutomation() {
    // 1. Determine which form we are currently viewing
    // Look for standard Return forms or specific Note forms
    const salesForm = document.getElementById('SalesReturnForm') || document.getElementById('CreditNoteForm');
    const purchaseForm = document.getElementById('PurchaseReturnForm') || document.getElementById('DebitNoteForm');
    
    const isSalesReturn = !!salesForm;
    const formEl = salesForm || purchaseForm;
    if (!formEl) return;

    // Formatter for currency
    const fmt = (val) => parseFloat(val || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    // 2. Set up variables based on the form type
    const fetchPath = isSalesReturn ? 'Transactions/SalesInvoiceForm' : 'Transactions/PurchaseInvoiceForm';
    
    // 🔥 FIX 1: Fetch from ALL possible return/note tables to ensure we don't miss any posted CNs
    const returnFetchPaths = isSalesReturn 
        ? ['Transactions/SalesReturnForm', 'Transactions/CreditNoteForm'] 
        : ['Transactions/PurchaseReturnForm', 'Transactions/DebitNoteForm'];
    
    const inputName = isSalesReturn ? 'original_invoice_no' : 'original_bill_no';
    const dateInputName = isSalesReturn ? 'original_invoice_date' : 'original_bill_date';
    const entityName = isSalesReturn ? 'customer_ledger' : 'supplier_ledger';
    
    // Auto-detect targets based on actual DOM rather than hardcoding IDs
    const targetInput = formEl.querySelector(`[name="${inputName}"]`);
    if (!targetInput) return;
    
    const datalistId = targetInput.getAttribute('list');
    const datalist = document.getElementById(datalistId);
    if (!datalist) return;

    const tableBodyId = formEl.querySelector('tbody')?.id;
    
    // Fallback math calculation execution
    const recalculateFunc = isSalesReturn 
        ? (typeof recalculateCrnVoucher === 'function' ? recalculateCrnVoucher : (typeof window.recalculateVoucher === 'function' ? window.recalculateVoucher : null)) 
        : (typeof recalculateDbnVoucher === 'function' ? recalculateDbnVoucher : (typeof window.recalculateVoucher === 'function' ? window.recalculateVoucher : null));

    // Helper function to robustly calculate total value of a transaction
    const getTransactionTotal = (txn) => {
        let total = parseFloat(txn.header?.grandTotal || txn.header?.invoice_value || txn.header?.total_amount || 0);
        if (total === 0 && txn.items) {
            const itemsArray = Array.isArray(txn.items) ? txn.items : Object.values(txn.items);
            itemsArray.forEach(i => {
                let rowTaxable = parseFloat(i.qty || 1) * parseFloat(i.rate || i.amount || 0);
                let cgst = parseFloat(i.cgst || i.cgst_amount || 0);
                let sgst = parseFloat(i.sgst || i.sgst_amount || 0);
                let igst = parseFloat(i.igst || i.igst_amount || 0);
                
                // Fallback if tax amounts are missing but percentage exists
                if (cgst === 0 && sgst === 0 && igst === 0) {
                    let taxPrc = parseFloat(i.auto_item_name_ItemTax || i.taxRate || 0);
                    rowTaxable += (rowTaxable * (taxPrc / 100));
                } else {
                    rowTaxable += (cgst + sgst + igst);
                }
                total += rowTaxable;
            });
        }
        // 🔥 FIX 2: Always return ABSOLUTE value to prevent negative math bugs
        return Math.abs(total); 
    };

    try {
        // 3. Fetch original transactions AND existing returns simultaneously
        const invoiceDataReq = API.Fetch(fetchPath).catch(() => null);
        const returnDataReqs = returnFetchPaths.map(path => API.Fetch(path).catch(() => null));
        
        const [invoiceData, ...allReturnDatas] = await Promise.all([invoiceDataReq, ...returnDataReqs]);

        if (!invoiceData) return;

        // 4. Map existing returned amounts against their original invoice numbers
        const returnedAmountsMap = {};
        
        allReturnDatas.forEach(returnData => {
            if (returnData) {
                Object.values(returnData).forEach(ret => {
                    // Search dynamically in header or meta for the reference number
                    const refNo = ret.header?.[inputName] || ret.meta?.[inputName] || ret.header?.original_invoice_no || ret.header?.original_bill_no || '';
                    if (refNo) {
                        const retTotal = getTransactionTotal(ret);
                        returnedAmountsMap[refNo] = (returnedAmountsMap[refNo] || 0) + retTotal;
                    }
                });
            }
        });

        // 5. Populate the datalist, excluding fully returned invoices
        const transactions = Object.values(invoiceData);
        datalist.innerHTML = ''; 
        
        transactions.forEach(txn => {
            const docNo = txn.header?.doc_no || txn.header?.Invoice || txn.header?.supplier_bill_no;
            const docDate = txn.header?.date || txn.header?.voucher_date;
            const entity = txn.header?.entity || txn.header?.[entityName];
            
            if (docNo) {
                const invTotal = getTransactionTotal(txn);
                const alreadyReturned = returnedAmountsMap[docNo] || 0;
                const remainingBalance = invTotal - alreadyReturned;

                // Only add to datalist if there is a remaining balance 
                // (Using 0.5 as a buffer to prevent floating-point rounding errors from hiding valid items)
                if (invTotal === 0 || remainingBalance > 0.5) {
                    const option = document.createElement('option');
                    option.value = docNo;
                    
                    // Show entity, date, and the remaining available balance
                    let displayString = `${entity || 'Unknown'} | Date: ${Utils.FormatDate(docDate)}`;
                    if (invTotal > 0) {
                        displayString += ` | Bal: ₹${fmt(remainingBalance)}`;
                    }
                    
                    option.textContent = displayString;
                    datalist.appendChild(option);
                }
            }
        });

        // 6. Listen for selection and map data to the return form
        targetInput.addEventListener('change', function(e) {
            const selectedDocNo = e.target.value.trim();
            if (!selectedDocNo) return;

            // Find the full transaction object that matches the selected document number
            const matchedTxn = transactions.find(txn => {
                const doc = txn.header?.doc_no || txn.header?.Invoice || txn.header?.supplier_bill_no;
                return doc === selectedDocNo;
            });

            if (matchedTxn) {
                // Map Header Data
                const h = matchedTxn.header;
                const dateField = formEl.querySelector(`[name="${dateInputName}"]`);
                if (dateField && (h.date || h.voucher_date)) {
                    dateField.value = h.date || h.voucher_date;
                }

                // Map Entity (Customer/Supplier)
                const entityField = formEl.querySelector(`[name="${entityName}"]`);
                if (entityField && (h.entity || h[entityName])) {
                    entityField.value = h.entity || h[entityName];
                }

                // Map Meta fields (GSTIN, State, etc.)
                Object.keys(h).forEach(key => {
                    const mappedInput = formEl.querySelector(`[name="auto_${entityName}_${key}"], [name="${key}"]`);
                    if (mappedInput && !['doc_no', 'Invoice', 'supplier_bill_no', 'date', 'voucher_date'].includes(key)) {
                        mappedInput.value = h[key];
                    }
                });

                // Map Line Items
                const tbody = document.getElementById(tableBodyId);
                const items = matchedTxn.items || [];
                
                if (tbody && items.length > 0) {
                    // Grab a clean template row before wiping the table
                    const templateRow = tbody.querySelector('tr').cloneNode(true);
                    
                    // Clear existing rows
                    tbody.innerHTML = '';

                    items.forEach((item, index) => {
                        const newRow = templateRow.cloneNode(true);
                        
                        // Update Serial Number
                        const srNo = newRow.querySelector('.sr-no');
                        if (srNo) srNo.innerText = index + 1;

                        // Fill item inputs
                        Object.keys(item).forEach(key => {
                            const input = newRow.querySelector(`[name="${key}"], [name="${key}[]"]`);
                            if (input) input.value = item[key];
                        });

                        tbody.appendChild(newRow);
                    });
                }

                // Trigger the core math engine to update totals based on the imported items
                if (typeof recalculateFunc === 'function') {
                    recalculateFunc();
                }

                if (typeof App !== 'undefined' && App.UI && App.UI.Notify) {
                    App.UI.Notify('Success', `Data linked with ${selectedDocNo}`, 'success');
                }
            }
        });

    } catch (error) {
        console.error("🔴 Failed to initialize return automation:", error);
    }
})();
</script>
