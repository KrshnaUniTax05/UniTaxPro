<div class="animate-in">
    <form id="PurchaseInvoiceForm" data-category="Transactions">
        <input type="hidden" name="documentType" value="PURCHASE">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-body p-0">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light sticky-top z-10">
                    <div>
                        <h5 class="fw-bold mb-0">Purchase Bill</h5>
                        <p class="text-muted small mb-0">Inward Supplies & Input Tax Credit</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-sm px-4 shadow-sm fw-bold">Post Bill</button>
                    </div>
                </div>

                <div class="p-4">
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-danger">Supplier / Vendor</label>
                            <input type="text" name="customer_ledger" class="form-control form-control-sm" 
                                   data-fetch_column data-sheet_name="LedgerCreation" data-column_name="name & ledgerCode" 
                                   list="vendorList" required placeholder="Search Supplier...">
                            <datalist id="vendorList"></datalist>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Supplier Bill No.</label>
                            <input type="text" name="supplier_bill_no" class="form-control form-control-sm upper-case font-monospace" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Bill Date</label>
                            <input type="date" name="voucher_date" id="purDate" class="form-control form-control-sm" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Project</label>
                            <input type="text" name="project" list="pcList" class="form-control form-control-sm" data-fetch_column data-sheet_name="Projects" data-column_name="ProjectName">
                            <datalist id="pcList"></datalist>
                        </div>
                    </div>

                    <table class="table table-sm table-hover border rounded-3" id="purchaseTable">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-3">#</th>
                                <th width="50%">Item Description</th>
                                <th>Qty</th>
                                <th>Rate</th>
                                <th class="text-end pe-3">Line Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="purchaseItemBody">
                            <tr>
                                <td class="sr-no ps-3">1</td>
                                <td>
                                    <input type="text" name="item_name[]" class="form-control form-control-sm border-0 bg-transparent itemName" 
                                           data-fetch_column data-sheet_name="Stock" data-column_name="itemName" list="pStockList" required>
                                    <datalist id="pStockList"></datalist>
                                    <input type="hidden" name="auto_item_name_ItemTax" class="tax-val">
                                </td>
                                <td><input type="number" name="qty[]" class="form-control form-control-sm border-0 qty text-center" value="1"></td>
                                <td><input type="number" name="rate[]" class="form-control form-control-sm border-0 rate text-end"></td>
                                <td class="text-end pe-3 fw-bold"><span class="line-total">0.00</span></td>
                                <td class="text-center"><button type="button" class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove(); recalculateVoucher();">&times;</button></td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="p-2 mb-3"><button type="button" class="btn btn-white btn-sm border" onclick="Utils.AddGridRow('purchaseTable')">+ Add Line</button></div>
                    
                    <div class="text-end border-top pt-3">
                        <h5 class="fw-bold">Bill Total: ₹ <span id="grand-total">0.00</span></h5>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
<script>
    document.getElementById('purDate').valueAsDate = new Date();
    document.getElementById('purchaseItemBody').addEventListener('input', recalculateVoucher);
</script>
