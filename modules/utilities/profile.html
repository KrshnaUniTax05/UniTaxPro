<div class="main-content-area h-100 w-100" style=" padding: 1rem 0;">
    <div class="container-fluid" style="min-height: calc(100vh-60px);">
        
        <div class="d-flex justify-content-between align-items-center ">
            <div>
                <h4 class="fw-bold text-dark mb-1">My Profile</h4>
                <p class="text-muted small mb-0">Manage your account settings and security preferences.</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 h-100 text-center  pb-4">
                    <div class="card-body d-flex  justify-content-center ">
                        <div class="position-relative d-inline-block mb-3">
                            <div class="bg-primary bg-opacity-10 text-white rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 100px; height: 100px;">
                                <h1 class="display-4 fw-bold mb-0 p-2" id="profileInitials">--</h1>
                            </div>
                            <span class="position-absolute bottom-0 end-0 p-2 bg-success border border-white rounded-circle" title="Active Status"></span>
                        </div>
                        
                        <h5 class="fw-bold text-dark mb-1" id="profileDisplayName">Loading...</h5>
                        <p class="text-muted small mb-3" id="profileDisplayEmail">--</p>
                        
                        <div id="profileRoleBadge" class="badge bg-primary bg-opacity-10 text-white px-3 py-2 text-uppercase mb-4">
                            ROLE
                        </div>

                        <div class="d-flex justify-content-around align-items-center text-center border-top pt-4 mt-2">
                            <div>
                                <h6 class="fw-bold text-dark mb-0" id="profileAccountCreated">--</h6>
                                <span class="text-muted small">Joined</span>
                            </div>
                            <div>
                                <h6 class="fw-bold text-dark mb-0" id="profileStatusText">Active</h6>
                                <span class="text-muted small">Status</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom pt-3 pb-0 px-4">
                        <ul class="nav nav-underline fs-6 fw-bold" id="profileTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active text-dark p-3" id="personal-tab" data-bs-toggle="tab" data-bs-target="#personal-info" type="button" role="tab">
                                    <i class="bi bi-person-lines-fill me-2"></i> Personal Info
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link text-dark p-3" id="security-tab" data-bs-toggle="tab" data-bs-target="#security-info" type="button" role="tab">
                                    <i class="bi bi-shield-lock-fill me-2"></i> Security
                                </button>
                            </li>
                        </ul>
                    </div>

                    <div class="card-body p-4 tab-content" id="profileTabsContent">
                        
                        <div class="tab-pane fade show active" id="personal-info" role="tabpanel">
                            <form id="profileUpdateForm">
                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold text-muted">Full Name</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
                                            <input type="text" id="inputProfileName" class="form-control" required>
                                        </div>
                                    </div>
                                    
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold text-muted">Designation</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light"><i class="bi bi-people text-muted"></i></span>
                                            <input type="email" id="inputProfiledesignation" class="form-control bg-light" readonly disabled>
                                        </div>
                                        
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold text-muted">Email Address (Read-Only)</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                                            <input type="email" id="inputProfileEmail" class="form-control bg-light" readonly disabled>
                                        </div>
                                        <div class="form-text" style="font-size: 0.7rem;">Contact the system administrator to change your email address.</div>
                                    </div>
                                </div>

                                <div class="text-end mt-4 pt-3 border-top">
                                    <button type="button" class="btn btn-primary fw-bold px-4" id="btnSaveProfile" onclick="UserProfileController.UpdateProfile()">
                                        <i class="bi bi-save me-1"></i> Save Changes
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="security-info" role="tabpanel">
                            <form id="passwordUpdateForm">
                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold text-muted">Current Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light"><i class="bi bi-key text-muted"></i></span>
                                            <input type="password" id="inputCurrentPassword" class="form-control" placeholder="Enter current password" required>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">New Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                                            <input type="password" id="inputNewPassword" class="form-control" placeholder="New password" required>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">Confirm New Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light"><i class="bi bi-lock-fill text-muted"></i></span>
                                            <input type="password" id="inputConfirmPassword" class="form-control" placeholder="Confirm new password" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="text-end mt-4 pt-3 border-top">
                                    <button type="button" class="btn btn-danger fw-bold px-4" id="btnSavePassword" onclick="UserProfileController.UpdatePassword()">
                                        <i class="bi bi-shield-check me-1"></i> Update Password
                                    </button>
                                </div>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

UserProfileController.LoadUserData();

</script>
<style>
    /* ==========================================================================
   MODERN ERP / SAAS DASHBOARD STYLES
   ========================================================================== */

/* --- 1. Global & Typography --- */

    font-size: 40px !important;
}

    transition: box-shadow 0.3s ease, transform 0.3s ease;
    background: var(--bg-surface);

/* --- 5. Buttons --- */
/* --- 6. Tables & Lists --- */
.table-sticky-wrapper {
    max-height: 550px;
    overflow-y: auto;
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
}

.table-sticky-wrapper thead th {
    position: sticky;
    top: 0;

    background-color: #f8faff !important; /* Very soft blue tint on hover */
}

/* Notification List Items */
.list-group-item {
    border-left: 3px solid transparent !important;
    transition: all 0.2s ease;
}

.list-group-item:hover {
    background-color: #fcfcfd;
    border-left: 3px solid #0d6efd !important;
}

/* --- 7. Badges & Avatars --- */
.badge {
    font-weight: 600;
    padding: 0.4em 0.8em;
    letter-spacing: 0.3px;
}

.rounded-circle {
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

/* --- 8. Tabs (Underline variant) --- */

    color: #6c757d;
    font-weight: 600;
    border-bottom-width: 3px;
    padding-bottom: 0.75rem;
    margin-right: 1rem;
    transition: all 0.2s ease;
}

.nav-underline .nav-link:hover {
    color: var(--text-color) !important;
    border-bottom-color: #dee2e6;
}

.nav-underline .nav-link.active {
    color: #0d6efd;
    border-bottom-color: #0d6efd;
}

/* --- 9. Custom Slim Scrollbar --- */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
    color: var(--text-color);
}

/* --- 10. Utilities --- */
.text-truncate {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
</style>
