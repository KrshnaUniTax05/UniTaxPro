<div class="container-fluid py-4">
    <div class="row">
        
        <div class="col-lg-4 border-end pe-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="m-0">Item Master</h4>
                <button class="btn btn-sm btn-primary shadow-sm" onclick="MasterEngine.CreateNew()">
                    <i class="bi bi-plus-lg"></i> New
                </button>
            </div>

            <div class="list-group shadow-sm" id="masterListContainer" style="max-height: 70vh; overflow-y: auto;">
                </div>
        </div>

        <div class="col-lg-8 ps-4">
            
            <div id="emptyWorkspaceState" class="text-center text-muted py-5 mt-5">
                <i class="bi bi-box-seam display-1 text-light"></i>
                <h5 class="mt-3">No Item Selected</h5>
                <p>Select an item from the list to view its details.</p>
            </div>

            <div id="activeWorkspace" style="display: none;">
                
                <div id="masterControlPanel" class="mb-3"></div>

                <form id="staticMasterForm" class="bg-white p-4 rounded shadow-sm border">
                    
                    <input type="hidden" id="active_record_key" name="record_key" value="">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">Item Code</label>
                            <input type="text" class="form-control" name="item_code" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">Item Name</label>
                            <input type="text" class="form-control" name="item_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">Category</label>
                            <select class="form-select" name="category" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="Finished Goods">Finished Goods</option>
                                <option value="Raw Material">Raw Material</option>
                                <option value="Services">Services</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">Base Price (₹)</label>
                            <input type="number" step="0.01" class="form-control" name="base_price">
                        </div>
                    </div>

                    <div class="mt-4 border-top pt-3 text-end">
                        <button type="submit" id="masterSubmitBtn" class="btn btn-success" style="display: none;">
                            <i class="bi bi-check-circle p-0"></i> Update Document
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
window.MasterEngine = {
    // 1. LOCAL DATA MEMORY (No server fetches needed for viewing)
    // When the page first loads, you would populate this ONCE from Firebase.
    _localDB: {
        "-NxA1b2": { item_code: "ITM-001", item_name: "Dell XPS 15", category: "Finished Goods", base_price: "150000" },
        "-NxC3d4": { item_code: "RAW-099", item_name: "Steel Bearings", category: "Raw Material", base_price: "450" }
    },

    // 2. RENDER THE LEFT LIST
    LoadList() {
        const listContainer = document.getElementById('masterListContainer');
        listContainer.innerHTML = '';

        if (Object.keys(this._localDB).length === 0) {
            listContainer.innerHTML = `<div class="p-3 text-muted text-center small">No records found.</div>`;
            return;
        }

        Object.entries(this._localDB).forEach(([key, record]) => {
            listContainer.innerHTML += `
                <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-start py-3" 
                        onclick="MasterEngine.ViewRecord('${key}')">
                    <div class="ms-2 me-auto">
                        <div class="fw-bold">${record.item_name}</div>
                        <small class="text-muted">${record.item_code} | ₹${record.base_price}</small>
                    </div>
                    <span class="badge bg-light text-dark border">${record.category}</span>
                </button>
            `;
        });
    },

    // 3. VIEW RECORD (Instantly populates the static HTML form)
    ViewRecord(key) {
        document.getElementById('emptyWorkspaceState').style.display = 'none';
        document.getElementById('activeWorkspace').style.display = 'block';
        
        const form = document.getElementById('staticMasterForm');
        const controlPanel = document.getElementById('masterControlPanel');
        
        // A. Secure the key in memory to prevent duplicates!
        document.getElementById('active_record_key').value = key;

        // B. Get data from local memory instantly
        const data = this._localDB[key];
        if (!data) return;

        // C. MAP DATA TO INPUTS automatically based on the 'name' attribute
        Object.entries(data).forEach(([dbKey, value]) => {
            const input = form.querySelector(`[name="${dbKey}"]`);
            if (input) input.value = value;
        });

        // D. LOCK THE FORM UI (Read-Only Mode)
        form.querySelectorAll('input, select, textarea').forEach(el => {
            if (el.type !== 'hidden') {
                el.readOnly = true;
                if(el.tagName === 'SELECT') el.style.pointerEvents = 'none';
            }
        });
        document.getElementById('masterSubmitBtn').style.display = 'none';

        // E. INJECT THE UNLOCK (EDIT) PANEL
        controlPanel.innerHTML = `
            <div class="alert alert-warning d-flex justify-content-between align-items-center m-0 py-2 shadow-sm border-warning">
                <span><i class="bi bi-eye me-2"></i><strong>Viewing Record:</strong> ${data.item_name}</span>
                <button type="button" class="btn btn-warning btn-sm fw-bold shadow-sm" onclick="MasterEngine.UnlockEdit()">
                    <i class="bi bi-pencil-square me-1"></i> Edit
                </button>
            </div>
        `;

        // F. Ghost-Buster: Bind the submit listener cleanly
        this._bindSubmit();
    },

    // 4. UNLOCK FOR EDITING
    UnlockEdit() {
        const form = document.getElementById('staticMasterForm');
        
        // Unlock all fields
        form.querySelectorAll('input, select, textarea').forEach(el => {
            el.readOnly = false;
            if(el.tagName === 'SELECT') el.style.pointerEvents = 'auto';
        });

        // Update Control Panel UI
        document.getElementById('masterControlPanel').innerHTML = `
            <div class="alert alert-success d-flex justify-content-between align-items-center m-0 py-2 shadow-sm border-success">
                <span><i class="bi bi-unlock-fill me-2"></i><strong>Editing Unlocked.</strong> Make your changes below.</span>
            </div>
        `;

        // Reveal the Save Button
        document.getElementById('masterSubmitBtn').style.display = 'inline-block';
    },

    // 5. CREATE NEW RECORD
    CreateNew() {
        document.getElementById('emptyWorkspaceState').style.display = 'none';
        document.getElementById('activeWorkspace').style.display = 'block';
        
        const form = document.getElementById('staticMasterForm');
        
        // Wipe the hidden key so the system knows it's brand new
        document.getElementById('active_record_key').value = '';

        // Clear all inputs and unlock them
        form.querySelectorAll('input, select, textarea').forEach(el => {
            if (el.type !== 'hidden') {
                el.value = '';
                el.readOnly = false;
                if(el.tagName === 'SELECT') el.style.pointerEvents = 'auto';
            }
        });

        document.getElementById('masterControlPanel').innerHTML = `
            <div class="alert alert-primary d-flex justify-content-between align-items-center m-0 py-2 shadow-sm border-primary">
                <span><i class="bi bi-plus-circle me-2"></i><strong>Creating New Record</strong></span>
            </div>
        `;

        const btn = document.getElementById('masterSubmitBtn');
        btn.style.display = 'inline-block';
        btn.innerHTML = '<i class="bi bi-plus-lg p-0"></i> Save New Record';
        
        this._bindSubmit();
    },

    // 6. GHOST-BUSTER BINDING
    _bindSubmit() {
        const form = document.getElementById('staticMasterForm');
        form.removeAttribute('onsubmit');
        
        const oldBtn = document.getElementById('masterSubmitBtn');
        const cleanBtn = oldBtn.cloneNode(true);
        oldBtn.parentNode.replaceChild(cleanBtn, oldBtn);
        
        form.removeEventListener('submit', this.HandleSubmit); // Remove if exists
        form.addEventListener('submit', this.HandleSubmit);
    },

    // 7. HANDLE SAVE (No Duplicates!)
    async HandleSubmit(e) {
        e.preventDefault();
        e.stopImmediatePropagation();

        const form = e.target;
        const activeKey = document.getElementById('active_record_key').value;
        const btn = document.getElementById('masterSubmitBtn');

        // Extract form data
        const formDataObj = new FormData(form);
        const payload = Object.fromEntries(formDataObj.entries());
        delete payload.record_key; // Don't save the hidden key to the DB payload

        try {
            const origHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
            btn.disabled = true;

            if (activeKey) {
                // UPDATE EXISTING RECORD
                console.log(`Updating Record at Key: ${activeKey}`, payload);
                
                // 1. Update your local memory instantly so the UI reflects it
                MasterEngine._localDB[activeKey] = payload;
                
                // 2. Push to Firebase quietly in the background
                // await API.DB.ref(`YourPath/Items/${activeKey}`).update(payload);
                
                if(App && App.UI) App.UI.Notify('Success', 'Record Updated', 'success');
            } else {
                // CREATE NEW RECORD
                console.log("Creating Brand New Record", payload);
                
                // 1. Generate a mock key for local testing (Firebase would do this normally)
                const newKey = "-Nx" + Math.random().toString(36).substr(2, 6);
                
                // 2. Update local memory
                MasterEngine._localDB[newKey] = payload;

                // 3. Push to Firebase
                // await API.DB.ref(`YourPath/Items`).push(payload);
                
                if(App && App.UI) App.UI.Notify('Success', 'Record Created', 'success');
                
                // Lock the key in so if they hit save again, it updates instead of duplicates
                document.getElementById('active_record_key').value = newKey;
            }

            // Refresh the left list instantly and lock the form back to view mode
            MasterEngine.LoadList();
            MasterEngine.ViewRecord(activeKey || newKey);

        } catch (error) {
            console.error("Save Error:", error);
        } finally {
            if(btn) btn.disabled = false;
        }
    }
};

// Initialize the list when the page loads
document.addEventListener('DOMContentLoaded', () => {
    MasterEngine.LoadList();
});
</script>
