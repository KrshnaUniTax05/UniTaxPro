<div class="animate-in">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light">
                <div>
                    <h5 class="fw-bold mb-0">General Ledger Statement</h5>
                    <p class="text-muted small mb-0">View account history and running balance</p>
                </div>
                <button type="button" class="btn btn-primary btn-sm px-4 shadow-sm fw-bold" onclick="generateStatement()">
                    <i class="bi bi-search me-1"></i> View Statement
                </button>
            </div>

            <div class="p-4">
                <form id="glFilterForm" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Select Ledger Account</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white"><i class="bi bi-person-badge"></i></span>
                            <input type="text" id="targetAccount" name="ledgerSearch" class="form-control" 
                                   list="ledgerList" placeholder="Search Ledger Name..." required
                                   data-fetch_column data-sheet_name="LedgerCreation" data-column_name="name&ledgerCode">
                        </div>
                        <datalist id="ledgerList"></datalist>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">From Date</label>
                        <input type="date" id="fromDate" class="form-control form-control-sm">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">To Date</label>
                        <input type="date" id="toDate" class="form-control form-control-sm">
                    </div>
                </form>
            </div>
            
            <div class="table-responsive">
                <table class="table table-sm table-hover mb-0" id="glTable">
                    <thead class="table-light border-top">
                        <tr>
                            <th class="ps-4">Date</th>
                            <th>Type</th>
                            <th>Doc No</th>
                            <th>Narration</th>
                            <th class="text-end">Debit</th>
                            <th class="text-end">Credit</th>
                            <th class="text-end pe-4">Balance</th>
                            <th class="text-end pe-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="glTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // 1. Initialize Dates
    const now = new Date();
    document.getElementById('toDate').valueAsDate = now;
    document.getElementById('fromDate').valueAsDate = new Date(now.getFullYear(), now.getMonth(), 1);

    /**
     * CORE ENGINE: Generate Statement
     */
    window.generateStatement = async function() {
        const account = document.getElementById('targetAccount').value;
        const tbody = document.getElementById('glTableBody');
        
        if (!account) return App.UI.Notify('Validation', 'Please select a ledger account.', 'warning');
        
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5"><div class="spinner-border spinner-border-sm text-primary"></div> Analyzing all transaction types...</td></tr>`;

        // 🚀 DYNAMIC FETCHING: Get all modules automatically
        const types = await API.GetAllTransactionTypes(); 
        let allTransactions = [];

        for (const type of types) {
            const data = await API.Fetch(`Transactions/${type}`);
            if (data) {
                Object.entries(data).forEach(([key, vch]) => {
                    vch.key = key; 
                    vch.formId = type;

                    // Flexible Match: Check if any field in header OR items contains the account name
                    const match = JSON.stringify(vch).toLowerCase().includes(account.toLowerCase());
                    
                    if (match) {
                        allTransactions.push(vch);
                    }
                });
            }
        }

        allTransactions.sort((a, b) => new Date(a.header.date) - new Date(b.header.date));

        tbody.innerHTML = '';
        let runningBalance = 0, totalDr = 0, totalCr = 0;

        if (allTransactions.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5 text-muted">No transactions found for this period.</td></tr>`;
            return;
        }

        allTransactions.forEach(vch => {
            const h = vch.header;
            const docPrefix = h.doc_no.split('/')[0];
            const amount = vch.items.reduce((sum, i) => sum + (parseFloat(i.total) || parseFloat(i.amount) || 0), 0);
            
            // Logic: You can adjust this 'isDr' logic based on your specific ERP accounting rules
            const isDr = ['SALE', 'PAYMENT', 'DRNOTE'].includes(docPrefix);
            const dr = isDr ? amount : 0;
            const cr = !isDr ? amount : 0;

            runningBalance += (dr - cr);
            totalDr += dr;
            totalCr += cr;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="ps-3">${Utils.FormatDate(h.date)}</td>
                <td><span class="badge border text-dark font-monospace">${docPrefix}</span></td>
                <td class="fw-bold text-primary">${h.doc_no}</td>
                <td><div class="fw-bold">${h.entity}</div><div class="text-muted small">${h.narration || ''}</div></td>
                <td class="text-end text-danger">${dr > 0 ? Utils.FormatINR(dr) : '-'}</td>
                <td class="text-end text-success">${cr > 0 ? Utils.FormatINR(cr) : '-'}</td>
                <td class="text-end fw-bold">${Utils.FormatINR(runningBalance)}</td>
                <td class="text-end pe-3">
                    <button class="btn btn-sm btn-outline-primary" onclick="editTransaction('${vch.formId}', '${vch.key}')"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteTransaction('${vch.formId}', '${vch.key}')"><i class="bi bi-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('statementSummary').style.display = 'flex';
        document.getElementById('statDebit').innerText = Utils.FormatINR(totalDr);
        document.getElementById('statCredit').innerText = Utils.FormatINR(totalCr);
        document.getElementById('statClosing').innerText = Utils.FormatINR(runningBalance);
    };

    /**
     * CRUD: Edit/Delete
     */
    window.deleteTransaction = async function(formId, key) {
        if(confirm("Permanently delete this transaction? This cannot be undone.")) {
            const success = await API.DeleteTransaction(formId, key);
            if(success) generateStatement();
        }
    };

    window.editTransaction = function(formId, key) {
        // Redirect to edit mode
        App.Router(`transactions/edit?type=${formId}&key=${key}`);
    };
})();
</script>
